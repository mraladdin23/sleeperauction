<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ballers Salary Cap Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--surface:#161820;--surface2:#1e2029;--surface3:#252733;--border:#2e3040;--border2:#3a3d52;--accent:#7c5cfc;--accent2:#9d7ffe;--green:#18e07a;--red:#ff4d6a;--yellow:#ffc94d;--cyan:#00d4ff;--text:#e8eaf0;--text2:#9296a8;--text3:#5a5e72;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:10px;--radius-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:rgba(22,24,32,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.topbar-logo{font-family:var(--font-display);font-size:22px;letter-spacing:1px;}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tbtn{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;transition:all .15s;font-family:var(--font-body);}
.tbtn:hover{color:var(--text);border-color:var(--border2);}
.last-upd{font-size:11px;color:var(--text3);}

.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;overflow-x:auto;}
.nav-tab{padding:12px 18px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-body);}
.nav-tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.nav-tab:hover:not(.active){color:var(--text);}

.main{padding:20px;max-width:1500px;margin:0 auto;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--text3);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.league-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;}
.sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sum-val{font-family:var(--font-mono);font-size:17px;font-weight:600;}
.sum-sub{font-size:10px;color:var(--text3);margin-top:2px;}

.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px;}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .2s;}
.ov-card:hover{border-color:var(--border2);}
.ov-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ov-name{font-weight:600;font-size:15px;}
.ov-user{font-size:11px;color:var(--text3);margin-top:1px;}
.cap-bar{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.cap-bar-fill{height:100%;border-radius:99px;}
.ov-money{display:flex;gap:14px;font-size:12px;color:var(--text2);margin-bottom:12px;}
.ov-money strong{font-family:var(--font-mono);}
.pos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.pos-blk{background:var(--surface2);border-radius:var(--radius-sm);padding:6px;text-align:center;}
.pos-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.pos-val{font-family:var(--font-mono);font-size:12px;font-weight:600;}
.top-player{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(46,48,64,.4);}
.top-player:last-child{border-bottom:none;}
.tp-left{display:flex;align-items:center;gap:6px;min-width:0;}
.tp-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-sal{font-family:var(--font-mono);font-size:11px;color:var(--text2);flex-shrink:0;}

.roster-controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.team-select{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font-body);cursor:pointer;outline:none;min-width:220px;}
.team-select:focus{border-color:var(--accent);}

.det-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.det-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.det-title{font-size:17px;font-weight:600;}
.det-user{font-size:12px;color:var(--text3);}
.det-cap-row{display:flex;gap:20px;align-items:center;}
.det-cap-item{text-align:right;}
.det-cap-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.det-cap-val{font-family:var(--font-mono);font-size:14px;font-weight:600;}

.roster-table{width:100%;border-collapse:collapse;}
.roster-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:7px 18px;border-bottom:1px solid var(--border);text-align:left;font-weight:500;background:var(--surface2);}
.roster-table th:last-child{text-align:right;}
.roster-table td{padding:7px 14px;border-bottom:1px solid rgba(46,48,64,.4);font-size:13px;vertical-align:middle;}
.roster-table tr:last-child td{border-bottom:none;}
.roster-table tr:hover td{background:rgba(255,255,255,.015);}
.roster-table td.sal-cell{text-align:right;font-family:var(--font-mono);font-size:12px;}
.roster-table td.act-cell{text-align:right;width:60px;}
.sec-row td{background:rgba(30,32,41,.7);color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:5px 18px;}
.sec-row td.sec-add{text-align:right;padding-right:14px;}

.pos-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.2px;}
.pb-QB{background:rgba(124,92,252,.2);color:#b89ffe;}.pb-RB{background:rgba(24,224,122,.15);color:#18e07a;}.pb-WR{background:rgba(0,212,255,.15);color:#00d4ff;}.pb-TE{background:rgba(255,201,77,.15);color:#ffc94d;}.pb-Taxi{background:rgba(90,94,114,.25);color:var(--text3);}.pb-IR{background:rgba(255,77,106,.15);color:#ff4d6a;}
.sal-bar{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:3px;width:100px;}
.sal-bar-fill{height:100%;border-radius:99px;}
.ir-note{font-size:10px;color:var(--red);margin-left:5px;}

/* edit/action buttons */
.act-btn{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;font-size:13px;opacity:.45;transition:opacity .15s;}
.act-btn:hover{opacity:1;}
.add-slot-btn{background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);color:var(--text3);cursor:pointer;font-size:11px;padding:3px 10px;transition:all .15s;font-family:var(--font-body);}
.add-slot-btn:hover{border-color:var(--accent);color:var(--accent2);}

.cmp-wrap{overflow-x:auto;}
.cmp-table{width:100%;border-collapse:collapse;min-width:860px;}
.cmp-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap;background:var(--surface2);}
.cmp-table th:first-child{text-align:left;}
.cmp-table td{padding:9px 14px;border-bottom:1px solid rgba(46,48,64,.35);font-size:13px;text-align:right;font-family:var(--font-mono);position:relative;}
.cmp-table td:first-child{text-align:left;font-family:var(--font-body);font-weight:500;}
.cmp-table tr:hover td{background:rgba(255,255,255,.02);}
.heat{position:absolute;inset:0;pointer-events:none;}
.best{color:var(--green)!important;}.worst{color:var(--red)!important;}
.cmp-name{font-weight:600;}.cmp-user{font-size:11px;color:var(--text3);}
.qb-h{color:#b89ffe;}.rb-h{color:#18e07a;}.wr-h{color:#00d4ff;}.te-h{color:#ffc94d;}

.top-paid-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
.tp-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.tp-section-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.tp-section-title{font-size:15px;font-weight:600;}
.tp-section-sub{font-size:11px;color:var(--text3);}
.tp-row{display:flex;align-items:center;padding:9px 18px;border-bottom:1px solid rgba(46,48,64,.4);gap:10px;}
.tp-row:last-child{border-bottom:none;}
.tp-rank{font-family:var(--font-mono);font-size:12px;color:var(--text3);width:20px;flex-shrink:0;text-align:right;}
.tp-rank-1{color:var(--yellow)!important;}.tp-rank-2{color:var(--text2)!important;}.tp-rank-3{color:#cd7f32!important;}
.tp-player-name{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-team-lbl{font-size:11px;color:var(--text3);flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-salary{font-family:var(--font-mono);font-size:13px;font-weight:600;flex-shrink:0;}
.tp-sal-bar-bg{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:2px;}
.tp-sal-bar-fill{height:100%;border-radius:99px;}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:480px;width:100%;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal-field{margin-bottom:14px;}
.modal-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.modal-input{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;}
.modal-input:focus{border-color:var(--accent);}
.modal-select{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;cursor:pointer;}
.modal-err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.btn-cancel{padding:8px 16px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font-body);}
.btn-save{padding:8px 18px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;cursor:pointer;font-family:var(--font-body);font-weight:500;}
.btn-danger{padding:8px 14px;background:rgba(255,77,106,.15);border:1px solid rgba(255,77,106,.3);border-radius:var(--radius-sm);color:var(--red);font-size:13px;cursor:pointer;font-family:var(--font-body);margin-right:auto;}

@media(max-width:600px){.overview-grid,.top-paid-grid{grid-template-columns:1fr;}.pos-grid{grid-template-columns:repeat(2,1fr);}.league-summary{grid-template-columns:repeat(2,1fr);}}

/* LIGHT MODE */
body.light-mode{--bg:#f4f5f8;--surface:#fff;--surface2:#eef0f5;--surface3:#e4e7ef;--border:#d4d8e8;--border2:#bbbfcf;--text:#18192a;--text2:#4a4e6a;--text3:#8a8eaa;}
body.light-mode .topbar{background:rgba(255,255,255,.95);}
body.light-mode .nav-tabs{background:var(--surface);}
body.light-mode .sec-row td{background:rgba(200,205,225,.4);}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* SEARCH */
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;flex:1;max-width:260px;}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:13px;padding:7px 0;width:100%;}
.search-wrap input::placeholder{color:var(--text3);}

/* SCARCITY */
.scar-zero{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(255,77,106,.15);color:var(--red);margin-left:4px;font-weight:600;}
.scar-one{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(255,201,77,.15);color:var(--yellow);margin-left:4px;font-weight:600;}

/* HOLDOUT */
.holdout-badge{display:inline-block;font-size:10px;background:rgba(255,201,77,.15);color:var(--yellow);border-radius:4px;padding:1px 5px;margin-left:5px;}

/* PROMOTED */
.promoted-badge{display:inline-block;font-size:10px;background:rgba(24,224,122,.12);color:var(--green);border-radius:4px;padding:1px 5px;margin-left:5px;}

/* TAXI TRACKER */
.taxi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.taxi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.taxi-card-hdr{padding:10px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.taxi-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid rgba(46,48,64,.35);}
.taxi-row:last-child{border-bottom:none;}
.taxi-info{flex:1;}
.taxi-pname{font-size:13px;font-weight:500;}
.taxi-psal{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.taxi-pnote{font-size:11px;color:var(--text3);font-style:italic;margin-top:1px;}
.promo-btn{font-size:11px;padding:3px 9px;border:1px solid rgba(24,224,122,.3);border-radius:4px;background:none;color:var(--green);cursor:pointer;font-family:var(--font-body);}
.undo-btn{font-size:11px;padding:3px 9px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text3);cursor:pointer;font-family:var(--font-body);}

/* PRINT */
@media print{
  body{background:#fff!important;color:#000!important;}
  .topbar,.nav-tabs,.roster-controls,.search-wrap,.act-btn,.add-slot-btn,.promo-btn,.undo-btn,.modal-overlay{display:none!important;}
  .main{padding:0!important;}
  .det-card,.taxi-card,.ov-card,.tp-section{break-inside:avoid;}
  .cap-bar-fill,.sal-bar-fill,.tp-sal-bar-fill{print-color-adjust:exact;-webkit-print-color-adjust:exact;}
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;">
    <div class="topbar-logo">Sleeper<span>Bid</span></div>
    <span style="font-size:13px;color:var(--text3);font-family:var(--font-body);margin-left:10px;">Salary Cap</span>
  </div>
  <div class="topbar-right">
    <span class="last-upd" id="last-upd"></span>
    <button class="tbtn" onclick="window.print()">🖨</button>
    <button class="tbtn" id="theme-btn" onclick="toggleTheme()">☀️</button>
    <a href="index.html" class="tbtn">🏈 Auctions</a>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="setTab('overview')">Overview</button>
  <button class="nav-tab" onclick="setTab('rosters')">Rosters</button>
  <button class="nav-tab" onclick="setTab('compare')">Compare</button>
  <button class="nav-tab" onclick="setTab('toppaid')">Top Paid</button>
  <button class="nav-tab" onclick="setTab('taxi')">🚕 Taxi</button>
</div>

<div class="main">
  <div id="loading" class="loading"><div class="spinner"></div><div>Connecting…</div></div>
  <div id="app" style="display:none;">
    <div id="tab-overview"></div>
    <div id="tab-rosters"  style="display:none;"></div>
    <div id="tab-compare"  style="display:none;"></div>
    <div id="tab-toppaid"  style="display:none;"></div>
    <div id="tab-taxi"     style="display:none;"></div>
  </div>
</div>

<!-- Edit / Add Player Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Edit Player</div>
    <div class="modal-field">
      <div class="modal-label">Player Name</div>
      <input class="modal-input" id="modal-name" type="text" placeholder="First Last"/>
    </div>
    <div class="modal-field" id="modal-pos-field">
      <div class="modal-label">Position</div>
      <select class="modal-select" id="modal-pos">
        <option value="QB">QB</option><option value="RB">RB</option>
        <option value="WR">WR</option><option value="TE">TE</option>
      </select>
    </div>
    <div class="modal-field">
      <div class="modal-label">Salary</div>
      <input class="modal-input" id="modal-salary" type="number" min="100000" step="100000" placeholder="e.g. 5000000"/>
      <div style="font-size:11px;color:var(--text3);margin-top:4px;">Enter full dollar amount (e.g. 5000000 = $5M)</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Roster Slot</div>
      <select class="modal-select" id="modal-slot">
        <option value="starters">Active Roster</option>
        <option value="ir">IR (75% cap hit)</option>
        <option value="taxi">Taxi (no cap hit)</option>
      </select>
    </div>
    <div class="modal-err" id="modal-err"></div>
    <div class="modal-footer">
      <button class="btn-danger" id="modal-delete-btn" onclick="deletePlayer()" style="display:none;">🗑 Remove</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="savePlayer()">Save</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
// ── Theme ────────────────────────────────────────────────────
function toggleTheme(){const l=document.body.classList.toggle('light-mode');localStorage.setItem('sb_theme',l?'light':'dark');document.getElementById('theme-btn').textContent=l?'🌙':'☀️';}
if(localStorage.getItem('sb_theme')==='light'){document.body.classList.add('light-mode');document.getElementById('theme-btn').textContent='🌙';}

const CAP         = 301_200_000;
const COMM        = 'mraladdin23';
const FB_PATH     = () => `leagues/${leagueId()}/rosterData`;
const POSITIONS   = ['QB','RB','WR','TE'];

function leagueId()  { return localStorage.getItem('sb_leagueId') || ''; }
function username()  { return localStorage.getItem('sb_username') || ''; }
function isComm()    { return username().toLowerCase() === COMM; }

let DATA = null;
let tab  = 'overview';
let rosterFilter = 'all';
let editCtx = null;
let holdouts = {};
let promos   = {};
let _promoTarget = null;

function rosterRef() { return db.ref(FB_PATH()); }

function subscribeRosters() {
  if (!leagueId()) { initWithFallback(); return; }
  const lid = leagueId();
  db.ref(`leagues/${lid}/holdouts`).once('value').then(s=>{holdouts=s.val()||{};if(DATA)renderTab(tab);}).catch(()=>{});
  db.ref(`leagues/${lid}/taxiPromos`).once('value').then(s=>{promos=s.val()||{};if(DATA)renderTab(tab);}).catch(()=>{});
  rosterRef().on('value', snap => {
    const fbData = snap.val();
    if (fbData && Object.keys(fbData).length > 0) {
      DATA = fbData;
      document.getElementById('last-upd').textContent = 'Live data';
    } else {
      DATA = JSON.parse(JSON.stringify(FALLBACK));
      document.getElementById('last-upd').textContent = 'Built-in data';
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';
    renderTab(tab);
  });
}

function initWithFallback() {
  DATA = JSON.parse(JSON.stringify(FALLBACK));
  document.getElementById('last-upd').textContent = 'Built-in data';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';
  renderTab(tab);
}

async function saveToFirebase() {
  if (!leagueId()) return;
  Object.values(DATA).forEach(t => {
    t.cap_spent = t.starters.reduce((s,p)=>s+p.salary,0)
      + (t.ir||[]).reduce((s,p)=>s+Math.round(p.salary*.75),0);
  });
  await rosterRef().set(DATA);
}

const fmtM    = n => n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+n;
const pctOf   = n => ((n/CAP)*100).toFixed(1)+'%';
const capClr  = s => s/CAP>.72?'var(--red)':s/CAP>.58?'var(--yellow)':'var(--green)';
const posTotal= (t,pos) => t.starters.filter(p=>p.pos===pos).reduce((a,p)=>a+p.salary,0);
const badge   = pos => `<span class="pos-badge pb-${pos}">${pos}</span>`;

// ── Tab switcher ──────────────────────────────────────────────
function setTab(t) {
  tab = t;
  ['overview','rosters','compare','toppaid','taxi'].forEach(n => {
    document.getElementById('tab-'+n).style.display = n===t?'':'none';
  });
  document.querySelectorAll('.nav-tab').forEach((b,i) =>
    b.classList.toggle('active', ['overview','rosters','compare','toppaid','taxi'][i]===t)
  );
  renderTab(t);
}
function renderTab(t) {
  if (!DATA) return;
  if      (t==='overview') renderOverview();
  else if (t==='rosters')  renderRosters();
  else if (t==='compare')  renderCompare();
  else if (t==='toppaid')  renderTopPaid();
  else if (t==='taxi')     renderTaxi();
}

// ── OVERVIEW ─────────────────────────────────────────────────
function renderOverview() {
  const el = document.getElementById('tab-overview');
  const teams = Object.values(DATA);
  const spentArr = teams.map(t=>t.cap_spent), availArr = teams.map(t=>CAP-t.cap_spent);
  const avg = Math.round(spentArr.reduce((a,b)=>a+b)/teams.length);

  const summary = [
    ['Salary Cap',     fmtM(CAP),                  '$1 = $100,000',       'var(--accent2)'],
    ['Avg Cap Spent',  fmtM(avg),                  pctOf(avg)+' of cap',  'var(--yellow)'],
    ['Most Spent',     fmtM(Math.max(...spentArr)), '',                    'var(--red)'],
    ['Least Spent',    fmtM(Math.min(...spentArr)), '',                    'var(--green)'],
    ['Most Available', fmtM(Math.max(...availArr)), '',                    'var(--green)'],
    ['Least Available',fmtM(Math.min(...availArr)), '',                    'var(--red)'],
  ].map(([l,v,s,c]) => `<div class="sum-card">
    <div class="sum-label">${l}</div>
    <div class="sum-val" style="color:${c};">${v}</div>
    ${s?`<div class="sum-sub">${s}</div>`:''}
  </div>`).join('');

  const cards = Object.entries(DATA).map(([key,t]) => {
    const sp=t.cap_spent, av=CAP-sp, clr=capClr(sp);
    const top3 = [...t.starters].sort((a,b)=>b.salary-a.salary).slice(0,3);
    const scarBadges = POSITIONS.map(pos=>{
      const cnt=t.starters.filter(p=>p.pos===pos).length;
      if(cnt===0) return `<span class="scar-zero">${pos}:0!</span>`;
      if(cnt===1) return `<span class="scar-one">${pos}:1</span>`;
      return '';
    }).filter(Boolean).join('');
    return `<div class="ov-card" onclick="window.location='team.html?team=${key}'" style="cursor:pointer;">
      <div class="ov-header">
        <div><div class="ov-name">${t.team_name}</div><div class="ov-user">${key}</div></div>
        <div style="text-align:right;">
          <div style="font-family:var(--font-mono);font-size:13px;font-weight:600;color:${clr};">${pctOf(sp)}</div>
          <div style="font-size:10px;color:var(--text3);">cap used</div>
        </div>
      </div>
      <div class="cap-bar"><div class="cap-bar-fill" style="width:${(sp/CAP*100).toFixed(1)}%;background:${clr};"></div></div>
      <div class="ov-money">
        <span><strong style="color:${clr};">${fmtM(sp)}</strong> spent</span>
        <span><strong style="color:var(--green);">${fmtM(av)}</strong> avail</span>
      </div>
      <div class="pos-grid">${POSITIONS.map(pos=>{
        const tot=posTotal(t,pos),cnt=t.starters.filter(p=>p.pos===pos).length;
        const c=cnt===0?'var(--red)':cnt===1?'var(--yellow)':POS_COLORS[pos];
        return `<div class="pos-blk"><div class="pos-lbl" style="color:${c};">${pos}</div><div class="pos-val" style="color:${c};">${fmtM(tot)}</div></div>`;
      }).join('')}</div>
      ${scarBadges?`<div style="margin-bottom:8px;">${scarBadges}</div>`:''}
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;">Top Salaries</div>
      ${top3.map(p=>`<div class="top-player">
        <div class="tp-left">${badge(p.pos)}<span class="tp-name">${p.name}</span></div>
        <span class="tp-sal">${fmtM(p.salary)}</span>
      </div>`).join('')}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="league-summary">${summary}</div><div class="overview-grid">${cards}</div>`;
}

// ── ROSTERS ───────────────────────────────────────────────────
function renderRosters() {
  const el = document.getElementById('tab-rosters');
  const comm = isComm();
  const maxSal = Math.max(...Object.values(DATA).flatMap(t=>t.starters.map(p=>p.salary)), 1);

  // Default to signed-in user on first load
  const myUser = username().toLowerCase();
  if (rosterFilter === 'all' && myUser && DATA[myUser]) rosterFilter = myUser;

  const options = `<option value="all">— All Teams —</option>` +
    Object.entries(DATA).map(([k,t]) =>
      `<option value="${k}"${k===rosterFilter?' selected':''}>${t.team_name}</option>`
    ).join('');

  const teamsToShow = rosterFilter==='all'
    ? Object.entries(DATA)
    : Object.entries(DATA).filter(([k])=>k===rosterFilter);

  const cards = teamsToShow.map(([key,t]) => {
    const sp=t.cap_spent, av=CAP-sp, clr=capClr(sp), pct=(sp/CAP*100).toFixed(1);
    const byPos={}; POSITIONS.forEach(p=>byPos[p]=[]);
    t.starters.forEach(p=>{if(byPos[p.pos])byPos[p.pos].push({...p});});

    const editTh = comm?'<th style="width:65px;"></th>':'';
    const colgroup = comm
      ? `<colgroup><col/><col style="width:50px;"/><col style="width:115px;"/><col style="width:65px;"/></colgroup>`
      : `<colgroup><col/><col style="width:50px;"/><col style="width:115px;"/></colgroup>`;

    const scarHtml = POSITIONS.map(pos=>{
      const cnt=(byPos[pos]||[]).length;
      if(cnt===0) return `<span class="scar-zero">${pos}:0!</span>`;
      if(cnt===1) return `<span class="scar-one">${pos}:1</span>`;
      return '';
    }).filter(Boolean).join(' ');

    let rows='';
    POSITIONS.forEach(pos=>{
      const players=(byPos[pos]||[])
        .map(p=>({...p,_idx:t.starters.findIndex(s=>s.name===p.name&&s.pos===pos&&s.salary===p.salary)}))
        .sort((a,b)=>b.salary-a.salary);
      if(!players.length){
        const ab=comm?`<button class="add-slot-btn" onclick="openAdd('${key}','starters','${pos}')">+</button>`:'';
        rows+=`<tr class="sec-row"><td colspan="${comm?3:2}">${pos} <span style="color:var(--red);">— none ⚠️</span></td><td class="sec-add">${ab}</td></tr>`;
        return;
      }
      const tot=players.reduce((s,p)=>s+p.salary,0);
      const ab=comm?`<button class="add-slot-btn" onclick="openAdd('${key}','starters','${pos}')">+${pos}</button>`:'';
      rows+=`<tr class="sec-row"><td colspan="${comm?3:2}">${pos} <span style="opacity:.55;font-size:10px;">— ${fmtM(tot)}</span></td><td class="sec-add">${ab}</td></tr>`;
      rows+=players.map(p=>{
        const bw=Math.round(p.salary/maxSal*100);
        const ho=(holdouts[key]||{})[p.name];
        const hoBadge=ho?`<span class="holdout-badge">🔥${ho.note?' '+ho.note:''}</span>`:'';
        const hoBtn=comm?`<button class="act-btn" onclick="toggleHoldout('${key}','${p.name.replace(/'/g,"\\'")}')" title="${ho?'Remove holdout':'Flag holdout'}">${ho?'🔥':'🏳'}</button>`:'';
        const editBtn=comm?`<td class="act-cell">${hoBtn}<button class="act-btn" onclick="openEdit('${key}','starters',${p._idx})">✏️</button></td>`:'';
        return `<tr class="pr">
          <td>${p.name}${hoBadge}</td>
          <td>${badge(p.pos)}</td>
          <td class="sal-cell"><div>${fmtM(p.salary)}</div>
            <div class="sal-bar"><div class="sal-bar-fill" style="width:${bw}%;background:${POS_COLORS[p.pos]||'var(--text3)'};"></div></div>
          </td>${editBtn}</tr>`;
      }).join('');
    });

    const irArr=t.ir||[];
    if(irArr.length){
      const ab=comm?`<button class="add-slot-btn" onclick="openAdd('${key}','ir','')">+IR</button>`:'';
      rows+=`<tr class="sec-row"><td colspan="${comm?3:2}">IR <span style="opacity:.55;font-size:10px;">75% cap</span></td><td class="sec-add">${ab}</td></tr>`;
      rows+=irArr.map((p,i)=>{
        const eb=comm?`<td class="act-cell"><button class="act-btn" onclick="openEdit('${key}','ir',${i})">✏️</button></td>`:'';
        return `<tr class="pr"><td>${p.name}<span class="ir-note">IR</span></td><td>${badge('IR')}</td><td class="sal-cell">${fmtM(Math.round(p.salary*.75))}</td>${eb}</tr>`;
      }).join('');
    } else if(comm){
      rows+=`<tr class="sec-row"><td colspan="3">IR <span style="opacity:.55;font-size:10px;">75% cap</span></td><td class="sec-add"><button class="add-slot-btn" onclick="openAdd('${key}','ir','')">+IR</button></td></tr>`;
    }

    const taxiArr=(t.taxi||[]).filter(p=>p.name);
    if(taxiArr.length){
      const taxiTot=taxiArr.reduce((s,p)=>s+p.salary,0);
      const ab=comm?`<button class="add-slot-btn" onclick="openAdd('${key}','taxi','')">+Taxi</button>`:'';
      rows+=`<tr class="sec-row"><td colspan="${comm?3:2}">Taxi <span style="opacity:.55;font-size:10px;">no cap · ${fmtM(taxiTot)}</span></td><td class="sec-add">${ab}</td></tr>`;
      rows+=taxiArr.map(p=>{
        const promo=(promos[key]||{})[p.name];
        const pb=promo?`<span class="promoted-badge">⬆️</span>`:'';
        const promoBtn=comm&&!promo?`<button class="promo-btn" onclick="openPromoModal('${key}','${p.name.replace(/'/g,"\\'")}')">⬆️</button>`:'';
        const undoBtn=comm&&promo?`<button class="undo-btn" onclick="undoPromo('${key}','${p.name.replace(/'/g,"\\'")}')">↩</button>`:'';
        const ti=(t.taxi||[]).findIndex(x=>x.name===p.name);
        const eb=comm?`<td class="act-cell">${promoBtn}${undoBtn}<button class="act-btn" onclick="openEdit('${key}','taxi',${ti})">✏️</button></td>`:'';
        return `<tr class="pr"><td style="color:var(--text3);">${p.name}${pb}</td><td>${badge('Taxi')}</td><td class="sal-cell" style="color:var(--text3);">${fmtM(p.salary)}</td>${eb}</tr>`;
      }).join('');
    } else if(comm){
      rows+=`<tr class="sec-row"><td colspan="3">Taxi</td><td class="sec-add"><button class="add-slot-btn" onclick="openAdd('${key}','taxi','')">+Taxi</button></td></tr>`;
    }

    return `<div class="det-card">
      <div class="det-header">
        <div>
          <a href="team.html?team=${key}" style="text-decoration:none;color:inherit;">
            <div class="det-title">${t.team_name} <span style="font-size:11px;color:var(--accent2);">↗</span></div>
          </a>
          <div class="det-user">${key}${scarHtml?' '+scarHtml:''}</div>
        </div>
        <div class="det-cap-row">
          <div class="det-cap-item"><div class="det-cap-label">Spent</div>
            <div class="det-cap-val" style="color:${clr};">${fmtM(sp)} <span style="font-size:10px;opacity:.6;">${pct}%</span></div>
          </div>
          <div class="det-cap-item"><div class="det-cap-label">Available</div>
            <div class="det-cap-val" style="color:var(--green);">${fmtM(av)}</div>
          </div>
        </div>
      </div>
      <div style="padding:4px 18px 0;">
        <div class="cap-bar"><div class="cap-bar-fill" style="width:${pct}%;background:${clr};"></div></div>
      </div>
      <table class="roster-table">${colgroup}
        <thead><tr><th>Player</th><th>Pos</th><th style="text-align:right;">Salary</th>${editTh}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="roster-controls">
      <select class="team-select" onchange="rosterFilter=this.value;renderRosters();">${options}</select>
      <div class="search-wrap">🔍<input id="roster-search" type="text" placeholder="Search players…"/></div>
      <span style="font-size:12px;color:var(--text3);">${rosterFilter==='all'?'All '+Object.keys(DATA).length+' teams':'1 team'}${comm?' · Comm':''}</span>
    </div>
    <div id="rc">${cards}</div>`;

  // Attach AFTER render — no focus stealing
  document.getElementById('roster-search')?.addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    document.querySelectorAll('#rc .pr').forEach(r => {
      r.style.display = (!q || (r.cells[0]?.textContent||'').toLowerCase().includes(q)) ? '' : 'none';
    });
    document.querySelectorAll('#rc .sec-row').forEach(sec => {
      let sib=sec.nextElementSibling, any=false;
      while(sib && !sib.classList.contains('sec-row')){
        if(sib.style.display!=='none'){any=true;break;}
        sib=sib.nextElementSibling;
      }
      sec.style.display=any?'':'none';
    });
  });
}

// ── COMPARE ──────────────────────────────────────────────────
function renderCompare() {
  const el = document.getElementById('tab-compare');
  const teams = Object.entries(DATA);
  const vals = {
    spent: teams.map(([,t])=>t.cap_spent),
    avail: teams.map(([,t])=>CAP-t.cap_spent),
    QB: teams.map(([,t])=>posTotal(t,'QB')),
    RB: teams.map(([,t])=>posTotal(t,'RB')),
    WR: teams.map(([,t])=>posTotal(t,'WR')),
    TE: teams.map(([,t])=>posTotal(t,'TE')),
  };
  function heat(val,arr,hex){const mn=Math.min(...arr),mx=Math.max(...arr),p=mx===mn?0:(val-mn)/(mx-mn);return `<div class="heat" style="background:${hex};opacity:${(p*.28+.04).toFixed(2)};"></div>`;}
  const sorted=[...teams].sort((a,b)=>b[1].cap_spent-a[1].cap_spent);
  const rows=sorted.map(([key,t])=>{
    const sp=t.cap_spent,av=CAP-sp,qb=posTotal(t,'QB'),rb=posTotal(t,'RB'),wr=posTotal(t,'WR'),te=posTotal(t,'TE');
    return `<tr>
      <td><div class="cmp-name"><a href="team.html?team=${key}" style="text-decoration:none;color:inherit;">${t.team_name}</a></div><div class="cmp-user">${key}</div></td>
      <td class="${sp===Math.max(...vals.spent)?'worst':sp===Math.min(...vals.spent)?'best':''}">${heat(sp,vals.spent,'#ff4d6a')}${fmtM(sp)}<div style="font-size:10px;color:var(--text3);">${pctOf(sp)}</div></td>
      <td style="color:var(--green);">${heat(av,vals.avail,'#18e07a')}${fmtM(av)}</td>
      <td class="qb-h">${heat(qb,vals.QB,'#b89ffe')}${fmtM(qb)}</td>
      <td class="rb-h">${heat(rb,vals.RB,'#18e07a')}${fmtM(rb)}</td>
      <td class="wr-h">${heat(wr,vals.WR,'#00d4ff')}${fmtM(wr)}</td>
      <td class="te-h">${heat(te,vals.TE,'#ffc94d')}${fmtM(te)}</td>
    </tr>`;
  }).join('');
  el.innerHTML=`<p style="font-size:12px;color:var(--text3);margin-bottom:14px;">Sorted by cap spent. Shading = relative spend per column.</p>
    <div class="cmp-wrap"><table class="cmp-table">
      <thead><tr><th style="text-align:left;">Team</th><th>Cap Spent</th><th style="color:var(--green);">Available</th>
      <th class="qb-h">QB</th><th class="rb-h">RB</th><th class="wr-h">WR</th><th class="te-h">TE</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

// ── TOP PAID ─────────────────────────────────────────────────
function renderTopPaid() {
  const el = document.getElementById('tab-toppaid');
  function topByPos(pos,limit){
    const all=[];
    Object.entries(DATA).forEach(([key,t])=>{t.starters.filter(p=>p.pos===pos).forEach(p=>all.push({...p,team_name:t.team_name}));});
    return all.sort((a,b)=>b.salary-a.salary).slice(0,limit);
  }
  const sections=[{pos:'QB',limit:10,label:'Top 10 QBs'},{pos:'RB',limit:10,label:'Top 10 RBs'},{pos:'WR',limit:15,label:'Top 15 WRs'},{pos:'TE',limit:5,label:'Top 5 TEs'}];
  el.innerHTML=`<div class="top-paid-grid">${sections.map(({pos,limit,label})=>{
    const players=topByPos(pos,limit);
    const maxSal=players[0]?.salary||1;
    const color=POS_COLORS[pos];
    return `<div class="tp-section">
      <div class="tp-section-header"><div class="tp-section-title" style="color:${color};">${label}</div><div class="tp-section-sub">by salary</div></div>
      ${players.map((p,i)=>{
        const cls=i===0?'tp-rank-1':i===1?'tp-rank-2':i===2?'tp-rank-3':'';
        return `<div class="tp-row">
          <div class="tp-rank ${cls}">${i+1}</div>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <span class="tp-player-name">${p.name}</span>
              <span class="tp-salary" style="color:${color};">${fmtM(p.salary)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:3px;">
              <div style="flex:1;"><div class="tp-sal-bar-bg"><div class="tp-sal-bar-fill" style="width:${Math.round(p.salary/maxSal*100)}%;background:${color};"></div></div></div>
              <span class="tp-team-lbl">${p.team_name}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}</div>`;
}

// ── TAXI TRACKER ──────────────────────────────────────────────
function renderTaxi() {
  const el = document.getElementById('tab-taxi');
  const comm = isComm();
  const allTeams = Object.entries(DATA).filter(([,t])=>(t.taxi||[]).filter(p=>p.name).length>0);
  if(!allTeams.length){el.innerHTML='<div style="color:var(--text3);padding:40px;text-align:center;">No taxi players found.</div>';return;}
  el.innerHTML=`<p style="font-size:13px;color:var(--text3);margin-bottom:16px;">Taxi squad players don't count toward the cap.${comm?' Commissioner can mark players as promoted.':''}</p>
    <div class="taxi-grid">${allTeams.map(([key,t])=>{
      const players=(t.taxi||[]).filter(p=>p.name).sort((a,b)=>b.salary-a.salary);
      const promoCount=players.filter(p=>(promos[key]||{})[p.name]).length;
      return `<div class="taxi-card">
        <div class="taxi-card-hdr">
          <a href="team.html?team=${key}" style="text-decoration:none;color:inherit;">${t.team_name}</a>
          <span style="font-size:11px;color:var(--text3);">${promoCount}/${players.length} promoted</span>
        </div>
        ${players.map(p=>{
          const promo=(promos[key]||{})[p.name];
          return `<div class="taxi-row">
            <div class="taxi-info">
              <div class="taxi-pname">${p.name}${promo?'<span class="promoted-badge">⬆️ Promoted</span>':''}</div>
              <div class="taxi-psal">${fmtM(p.salary)}</div>
              ${promo?.note?`<div class="taxi-pnote">${promo.note}</div>`:''}
            </div>
            <div style="display:flex;gap:4px;">
              ${comm&&!promo?`<button class="promo-btn" onclick="openPromoModal('${key}','${p.name.replace(/'/g,"\\'")}')">⬆️ Promote</button>`:''}
              ${comm&&promo?`<button class="undo-btn" onclick="undoPromo('${key}','${p.name.replace(/'/g,"\\'")}')">↩ Undo</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}</div>`;
}

// ── HOLDOUT ───────────────────────────────────────────────────
async function toggleHoldout(teamKey, playerName) {
  if(!leagueId()) return;
  const safe=playerName.replace(/[.#$\/\[\]]/g,'_');
  const existing=(holdouts[teamKey]||{})[playerName];
  if(existing){
    if(!holdouts[teamKey]) holdouts[teamKey]={};
    delete holdouts[teamKey][playerName];
    await db.ref(`leagues/${leagueId()}/holdouts/${teamKey}/${safe}`).remove();
    showToast('Holdout flag removed','info');
  } else {
    const note=prompt(`Holdout note for ${playerName} (optional):`)||'';
    if(!holdouts[teamKey]) holdouts[teamKey]={};
    const data={note,year:new Date().getFullYear(),flaggedAt:Date.now()};
    holdouts[teamKey][playerName]=data;
    await db.ref(`leagues/${leagueId()}/holdouts/${teamKey}/${safe}`).set(data);
    showToast(`${playerName} flagged as holdout 🔥`,'warn');
  }
  renderTab(tab);
}

// ── PROMO ─────────────────────────────────────────────────────
async function openPromoModal(teamKey, playerName) {
  _promoTarget={teamKey,playerName};
  const note=prompt(`Promotion note for ${playerName} (optional):`);
  if(note===null){_promoTarget=null;return;}
  const safe=playerName.replace(/[.#$\/\[\]]/g,'_');
  if(!promos[teamKey]) promos[teamKey]={};
  const data={note:note||'',promoted:true,promotedAt:Date.now()};
  promos[teamKey][playerName]=data;
  await db.ref(`leagues/${leagueId()}/taxiPromos/${teamKey}/${safe}`).set(data);
  showToast(`${playerName} marked as promoted ⬆️`,'success');
  _promoTarget=null;
  renderTab(tab);
}
async function undoPromo(teamKey, playerName) {
  if(!leagueId()) return;
  const safe=playerName.replace(/[.#$\/\[\]]/g,'_');
  if(promos[teamKey]) delete promos[teamKey][playerName];
  await db.ref(`leagues/${leagueId()}/taxiPromos/${teamKey}/${safe}`).remove();
  showToast('Promotion undone','info');
  renderTab(tab);
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg,type='info'){
  let c=document.getElementById('tc');
  if(!c){c=document.createElement('div');c.id='tc';c.style.cssText='position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999;';document.body.appendChild(c);}
  const colors={success:'var(--green)',warn:'var(--yellow)',error:'var(--red)',info:'var(--accent)'};
  const el=document.createElement('div');
  el.style.cssText=`background:var(--surface2);border:1px solid var(--border2);border-left:3px solid ${colors[type]||colors.info};border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideIn .2s ease;`;
  el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3200);
}

// ── EDITOR MODAL ──────────────────────────────────────────────
function openEdit(teamKey,slot,idx){
  const t=DATA[teamKey];
  const p=slot==='ir'?t.ir[idx]:slot==='taxi'?t.taxi[idx]:t.starters[idx];
  if(!p) return;
  editCtx={teamKey,slot,idx,isNew:false};
  document.getElementById('modal-title').textContent='Edit Player';
  document.getElementById('modal-name').value=p.name;
  document.getElementById('modal-salary').value=p.salary;
  document.getElementById('modal-slot').value=slot;
  document.getElementById('modal-delete-btn').style.display='';
  document.getElementById('modal-err').textContent='';
  const pf=document.getElementById('modal-pos-field');
  if(slot==='starters'){pf.style.display='';document.getElementById('modal-pos').value=p.pos||'WR';}
  else pf.style.display='none';
  document.getElementById('edit-modal').style.display='flex';
}
function openAdd(teamKey,slot,defaultPos){
  editCtx={teamKey,slot,idx:-1,isNew:true};
  document.getElementById('modal-title').textContent='Add Player';
  document.getElementById('modal-name').value='';
  document.getElementById('modal-salary').value='';
  document.getElementById('modal-slot').value=slot;
  document.getElementById('modal-delete-btn').style.display='none';
  document.getElementById('modal-err').textContent='';
  const pf=document.getElementById('modal-pos-field');
  pf.style.display='';
  document.getElementById('modal-pos').value=defaultPos||'WR';
  document.getElementById('edit-modal').style.display='flex';
}
function closeModal(){document.getElementById('edit-modal').style.display='none';editCtx=null;}
async function savePlayer(){
  if(!editCtx) return;
  const name=document.getElementById('modal-name').value.trim();
  const salary=parseInt(document.getElementById('modal-salary').value);
  const slot=document.getElementById('modal-slot').value;
  const pos=document.getElementById('modal-pos').value;
  const errEl=document.getElementById('modal-err');
  if(!name){errEl.textContent='Player name required.';return;}
  if(!salary||salary<0){errEl.textContent='Enter a valid salary.';return;}
  const{teamKey,idx,isNew}=editCtx;
  const t=DATA[teamKey];
  if(!isNew){
    const os=editCtx.slot;
    if(os==='starters')t.starters.splice(idx,1);
    else if(os==='ir')t.ir.splice(idx,1);
    else if(os==='taxi')t.taxi.splice(idx,1);
  }
  const player=slot==='starters'?{pos,name,salary}:{name,salary};
  if(slot==='starters')t.starters.push(player);
  else if(slot==='ir'){if(!t.ir)t.ir=[];t.ir.push(player);}
  else if(slot==='taxi'){if(!t.taxi)t.taxi=[];t.taxi.push(player);}
  closeModal();
  await saveToFirebase();
}
async function deletePlayer(){
  if(!editCtx||editCtx.isNew) return;
  const{teamKey,slot,idx}=editCtx;
  const t=DATA[teamKey];
  if(slot==='starters')t.starters.splice(idx,1);
  else if(slot==='ir')t.ir.splice(idx,1);
  else if(slot==='taxi')t.taxi.splice(idx,1);
  closeModal();
  await saveToFirebase();
}

document.getElementById('edit-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('edit-modal'))closeModal();
});

subscribeRosters();
</script>
