<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ballers Salary Cap Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0d0f14; --surface:#161820; --surface2:#1e2029; --surface3:#252733;
  --border:#2e3040; --border2:#3a3d52;
  --accent:#7c5cfc; --accent2:#9d7ffe;
  --green:#18e07a; --red:#ff4d6a; --yellow:#ffc94d; --cyan:#00d4ff;
  --text:#e8eaf0; --text2:#9296a8; --text3:#5a5e72;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:rgba(22,24,32,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.topbar-logo{font-family:var(--font-display);font-size:22px;letter-spacing:1px;color:var(--text);}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.topbar-right a,.topbar-right button{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;transition:color .15s,border-color .15s;font-family:var(--font-body);}
.topbar-right a:hover,.topbar-right button:hover{color:var(--text);border-color:var(--border2);}
.last-updated{font-size:11px;color:var(--text3);}

/* NAV TABS */
.nav-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 20px;overflow-x:auto;}
.nav-tab{padding:12px 18px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-body);}
.nav-tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.nav-tab:hover:not(.active){color:var(--text);}

.main{padding:20px;max-width:1500px;margin:0 auto;}

/* Loading / Error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--text3);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-msg{background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.3);border-radius:var(--radius);padding:16px 20px;color:var(--red);max-width:500px;margin:40px auto;text-align:center;}

/* LEAGUE SUMMARY */
.league-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;}
.sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sum-val{font-family:var(--font-mono);font-size:17px;font-weight:600;}
.sum-sub{font-size:10px;color:var(--text3);margin-top:2px;}

/* OVERVIEW GRID */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px;}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .2s;}
.ov-card:hover{border-color:var(--border2);}
.ov-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ov-name{font-weight:600;font-size:15px;}
.ov-user{font-size:11px;color:var(--text3);margin-top:1px;}
.ov-pct{font-family:var(--font-mono);font-size:13px;font-weight:600;text-align:right;}
.cap-bar{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.cap-bar-fill{height:100%;border-radius:99px;}
.ov-money{display:flex;gap:14px;font-size:12px;color:var(--text2);margin-bottom:12px;}
.ov-money strong{font-family:var(--font-mono);}
.pos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.pos-blk{background:var(--surface2);border-radius:var(--radius-sm);padding:6px;text-align:center;}
.pos-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.pos-val{font-family:var(--font-mono);font-size:12px;font-weight:600;}
.top-player{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(46,48,64,.4);}
.top-player:last-child{border-bottom:none;}
.tp-left{display:flex;align-items:center;gap:6px;min-width:0;}
.tp-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-sal{font-family:var(--font-mono);font-size:11px;color:var(--text2);flex-shrink:0;}

/* ROSTER VIEW - dropdown + detail */
.roster-controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.team-select{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font-body);cursor:pointer;outline:none;min-width:220px;}
.team-select:focus{border-color:var(--accent);}
.all-rosters-hint{font-size:12px;color:var(--text3);}

.det-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.det-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.det-title{font-size:17px;font-weight:600;}
.det-user{font-size:12px;color:var(--text3);}
.det-cap-row{display:flex;gap:20px;}
.det-cap-item{text-align:right;}
.det-cap-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.det-cap-val{font-family:var(--font-mono);font-size:14px;font-weight:600;}

.roster-table{width:100%;border-collapse:collapse;}
.roster-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:7px 18px;border-bottom:1px solid var(--border);text-align:left;font-weight:500;background:var(--surface2);}
.roster-table th:last-child{text-align:right;}
.roster-table td{padding:7px 18px;border-bottom:1px solid rgba(46,48,64,.4);font-size:13px;vertical-align:middle;}
.roster-table tr:last-child td{border-bottom:none;}
.roster-table tr:hover td{background:rgba(255,255,255,.015);}
.roster-table td:last-child{text-align:right;font-family:var(--font-mono);font-size:12px;}
.sec-row td{background:rgba(30,32,41,.7);color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:5px 18px;}

.pos-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.2px;}
.pb-QB{background:rgba(124,92,252,.2);color:#b89ffe;}
.pb-RB{background:rgba(24,224,122,.15);color:#18e07a;}
.pb-WR{background:rgba(0,212,255,.15);color:#00d4ff;}
.pb-TE{background:rgba(255,201,77,.15);color:#ffc94d;}
.pb-Taxi{background:rgba(90,94,114,.25);color:var(--text3);}
.pb-IR{background:rgba(255,77,106,.15);color:#ff4d6a;}
.sal-bar{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:3px;width:100px;}
.sal-bar-fill{height:100%;border-radius:99px;}
.ir-note{font-size:10px;color:var(--red);margin-left:5px;}

/* COMPARE */
.cmp-wrap{overflow-x:auto;}
.cmp-table{width:100%;border-collapse:collapse;min-width:860px;}
.cmp-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap;background:var(--surface2);}
.cmp-table th:first-child{text-align:left;}
.cmp-table td{padding:9px 14px;border-bottom:1px solid rgba(46,48,64,.35);font-size:13px;text-align:right;font-family:var(--font-mono);position:relative;}
.cmp-table td:first-child{text-align:left;font-family:var(--font-body);font-weight:500;}
.cmp-table tr:hover td{background:rgba(255,255,255,.02);}
.heat{position:absolute;inset:0;pointer-events:none;}
.best{color:var(--green)!important;} .worst{color:var(--red)!important;}
.cmp-name{font-weight:600;} .cmp-user{font-size:11px;color:var(--text3);}
.qb-h{color:#b89ffe;} .rb-h{color:#18e07a;} .wr-h{color:#00d4ff;} .te-h{color:#ffc94d;}

/* TOP PAID */
.top-paid-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;}
.tp-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.tp-section-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.tp-section-title{font-size:15px;font-weight:600;}
.tp-section-sub{font-size:11px;color:var(--text3);}
.tp-row{display:flex;align-items:center;padding:9px 18px;border-bottom:1px solid rgba(46,48,64,.4);gap:10px;}
.tp-row:last-child{border-bottom:none;}
.tp-row:hover{background:rgba(255,255,255,.015);}
.tp-rank{font-family:var(--font-mono);font-size:12px;color:var(--text3);width:20px;flex-shrink:0;text-align:right;}
.tp-rank-1{color:var(--yellow)!important;}
.tp-rank-2{color:var(--text2)!important;}
.tp-rank-3{color:#cd7f32!important;}
.tp-player-name{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-team{font-size:11px;color:var(--text3);flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-salary{font-family:var(--font-mono);font-size:13px;font-weight:600;flex-shrink:0;}
.tp-sal-bar-bg{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:2px;}
.tp-sal-bar-fill{height:100%;border-radius:99px;}

@media(max-width:600px){
  .overview-grid,.top-paid-grid{grid-template-columns:1fr;}
  .pos-grid{grid-template-columns:repeat(2,1fr);}
  .league-summary{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;">
    <div class="topbar-logo">Sleeper<span>Bid</span></div>
    <span style="font-size:13px;color:var(--text3);font-family:var(--font-body);margin-left:10px;">Salary Cap</span>
  </div>
  <div class="topbar-right">
    <span class="last-updated" id="last-updated"></span>
    <button onclick="loadData(true)">↻ Refresh</button>
    <a href="index.html">🏈 Auctions</a>
  </div>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="setTab('overview')">Overview</button>
  <button class="nav-tab" onclick="setTab('rosters')">Rosters</button>
  <button class="nav-tab" onclick="setTab('compare')">Compare</button>
  <button class="nav-tab" onclick="setTab('toppaid')">Top Paid</button>
</div>

<div class="main">
  <div id="loading" class="loading"><div class="spinner"></div><div>Loading salary data…</div></div>
  <div id="error"   style="display:none;"></div>
  <div id="app"     style="display:none;">
    <div id="tab-overview"></div>
    <div id="tab-rosters"  style="display:none;"></div>
    <div id="tab-compare"  style="display:none;"></div>
    <div id="tab-toppaid"  style="display:none;"></div>
  </div>
</div>

<script>
const CAP       = 301_200_000;
const CSV_URL   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTHlAuxnGZv5k__D0ssTLGice7tSPw1BZmNUiSULQWwnIJDGoEJcrNgzz1unk4ejfWL__g0zAaCeHeJ/pub?gid=1691605792&single=true&output=csv';
const CACHE_KEY = 'sleeperBidSalaryCSV';
const CACHE_TS  = 'sleeperBidSalaryTS';
const CACHE_TTL = 5 * 60 * 1000;

const POSITIONS  = ['QB','RB','WR','TE'];
const POS_COLORS = {QB:'#b89ffe',RB:'#18e07a',WR:'#00d4ff',TE:'#ffc94d'};
const TOP_LIMITS = {QB:10,RB:10,WR:15,TE:5};

const TEAM_COL_STARTS = [0,4,8,12,16,20,24,28,32,36,40,44];

let DATA    = null;
let tab     = 'overview';
let rosterFilter = 'all'; // 'all' or a team key

// ── CSV parser ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  return text.split('\n').map(line => {
    const row = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    row.push(cur.trim());
    return row;
  });
}

function parseSalary(s) {
  const n = parseInt((s||'').replace(/[$,]/g,''));
  return isNaN(n) ? 0 : n;
}

function parseSheet(rows) {
  const data = {};
  const headerRow = rows[0] || [];
  const teamNames = TEAM_COL_STARTS.map(c => (headerRow[c]||'').trim());
  const usernames = teamNames.map(n => {
    const m = n.match(/\(([^)]+)\)/);
    return m ? m[1].toLowerCase() : n.toLowerCase().replace(/[^a-z0-9]/g,'');
  });

  TEAM_COL_STARTS.forEach((col,i) => {
    if (!usernames[i]) return;
    data[usernames[i]] = {
      team_name: teamNames[i].replace(/\s*\([^)]*\)/,'').trim(),
      cap_spent: 0, starters:[], ir:[], taxi:[]
    };
  });

  const KNOWN_POS = new Set(['QB','RB','WR','TE','K','DEF']);
  const STARTER_ROWS = Array.from({length:24},(_,i)=>i+2);
  const IR_ROWS   = [32,33];
  const TAXI_ROWS = Array.from({length:10},(_,i)=>i+37);

  function readCell(row, col) {
    return {
      pos:  (row[col]   ||'').trim(),
      name: (row[col+1] ||'').trim(),
      sal:  parseSalary(row[col+2]||'')
    };
  }

  STARTER_ROWS.forEach(ri => {
    const row = rows[ri]; if (!row) return;
    TEAM_COL_STARTS.forEach((col,ti) => {
      const {pos,name,sal} = readCell(row,col);
      if (name && sal>0 && KNOWN_POS.has(pos))
        data[usernames[ti]].starters.push({pos,name,salary:sal});
    });
  });

  IR_ROWS.forEach(ri => {
    const row = rows[ri]; if (!row) return;
    TEAM_COL_STARTS.forEach((col,ti) => {
      if ((row[col]||'').trim().toUpperCase()!=='IR') return;
      const name=(row[col+1]||'').trim(), sal=parseSalary(row[col+2]||'');
      if (name&&sal>0) data[usernames[ti]].ir.push({name,salary:sal});
    });
  });

  TAXI_ROWS.forEach(ri => {
    const row = rows[ri]; if (!row) return;
    TEAM_COL_STARTS.forEach((col,ti) => {
      if ((row[col]||'').trim().toUpperCase()!=='TAXI') return;
      const name=(row[col+1]||'').trim(), sal=parseSalary(row[col+2]||'');
      if (name&&sal>0) data[usernames[ti]].taxi.push({name,salary:sal});
    });
  });

  // Cap spent from row 49
  const capRow = rows[49]||[];
  TEAM_COL_STARTS.forEach((col,ti) => {
    const v = parseSalary(capRow[col+2]||'');
    data[usernames[ti]].cap_spent = v || data[usernames[ti]].starters.reduce((s,p)=>s+p.salary,0);
  });

  return data;
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadData(force=false) {
  document.getElementById('loading').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('error').style.display='none';
  try {
    let csv = null;
    if (!force) {
      const cached=localStorage.getItem(CACHE_KEY), ts=parseInt(localStorage.getItem(CACHE_TS)||'0');
      if (cached && Date.now()-ts < CACHE_TTL) csv=cached;
    }
    if (!csv) {
      const res=await fetch(CSV_URL);
      if (!res.ok) throw new Error('HTTP '+res.status);
      csv=await res.text();
      localStorage.setItem(CACHE_KEY,csv);
      localStorage.setItem(CACHE_TS,Date.now().toString());
    }
    DATA=parseSheet(parseCSV(csv));
    const ts=new Date(parseInt(localStorage.getItem(CACHE_TS)));
    document.getElementById('last-updated').textContent='Updated '+ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='';
    renderAll();
  } catch(err) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='';
    document.getElementById('error').innerHTML=`<div class="error-msg">
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Failed to load salary data</div>
      <div style="font-size:13px;opacity:.8;">${err.message}</div>
      <button onclick="loadData(true)" style="margin-top:12px;padding:7px 16px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:13px;cursor:pointer;">Retry</button>
    </div>`;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmtM   = n => n>=1e6?'$'+(n/1e6).toFixed(1)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+n;
const pctOf  = n => ((n/CAP)*100).toFixed(1)+'%';
const capClr = s => s/CAP>.72?'var(--red)':s/CAP>.58?'var(--yellow)':'var(--green)';
const posTotal = (t,pos) => t.starters.filter(p=>p.pos===pos).reduce((a,p)=>a+p.salary,0);
const badge  = pos => `<span class="pos-badge pb-${pos}">${pos}</span>`;

// ── Tab switcher ─────────────────────────────────────────────────────────────
function setTab(t) {
  tab=t;
  ['overview','rosters','compare','toppaid'].forEach(n=>{
    document.getElementById('tab-'+n).style.display=n===t?'':'none';
  });
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{
    b.classList.toggle('active',['overview','rosters','compare','toppaid'][i]===t);
  });
  renderTab(t);
}
function renderAll() {
  renderTab('overview');
  // Others render on demand
}
function renderTab(t) {
  if (t==='overview') renderOverview();
  else if (t==='rosters') renderRosters();
  else if (t==='compare') renderCompare();
  else if (t==='toppaid') renderTopPaid();
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
function renderOverview() {
  const el=document.getElementById('tab-overview');
  const teams=Object.values(DATA);
  const spent=teams.map(t=>t.cap_spent), avail=teams.map(t=>CAP-t.cap_spent);
  const avg=Math.round(spent.reduce((a,b)=>a+b)/teams.length);

  const summary=[
    ['Salary Cap',    fmtM(CAP),             '$1 = $100,000',        'var(--accent2)'],
    ['Avg Cap Spent', fmtM(avg),             pctOf(avg)+' of cap',   'var(--yellow)'],
    ['Most Spent',    fmtM(Math.max(...spent)),'',                   'var(--red)'],
    ['Least Spent',   fmtM(Math.min(...spent)),'',                   'var(--green)'],
    ['Most Available',fmtM(Math.max(...avail)),'',                   'var(--green)'],
    ['Least Available',fmtM(Math.min(...avail)),'',                  'var(--red)'],
  ].map(([l,v,s,c])=>`<div class="sum-card">
    <div class="sum-label">${l}</div>
    <div class="sum-val" style="color:${c};">${v}</div>
    ${s?`<div class="sum-sub">${s}</div>`:''}
  </div>`).join('');

  const cards=Object.entries(DATA).map(([key,t])=>{
    const sp=t.cap_spent,av=CAP-sp,clr=capClr(sp);
    const top3=[...t.starters].sort((a,b)=>b.salary-a.salary).slice(0,3);
    return `<div class="ov-card">
      <div class="ov-header">
        <div><div class="ov-name">${t.team_name}</div><div class="ov-user">${key}</div></div>
        <div><div class="ov-pct" style="color:${clr};">${pctOf(sp)}</div>
          <div style="font-size:10px;color:var(--text3);">cap used</div></div>
      </div>
      <div class="cap-bar"><div class="cap-bar-fill" style="width:${(sp/CAP*100).toFixed(1)}%;background:${clr};"></div></div>
      <div class="ov-money">
        <span><strong style="color:${clr};">${fmtM(sp)}</strong> spent</span>
        <span><strong style="color:var(--green);">${fmtM(av)}</strong> avail</span>
      </div>
      <div class="pos-grid">${POSITIONS.map(pos=>{
        const tot=posTotal(t,pos);
        return `<div class="pos-blk">
          <div class="pos-lbl" style="color:${POS_COLORS[pos]};">${pos}</div>
          <div class="pos-val" style="color:${POS_COLORS[pos]};">${fmtM(tot)}</div>
        </div>`;
      }).join('')}</div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;">Top Salaries</div>
      ${top3.map(p=>`<div class="top-player">
        <div class="tp-left">${badge(p.pos)}<span class="tp-name">${p.name}</span></div>
        <span class="tp-sal">${fmtM(p.salary)}</span>
      </div>`).join('')}
    </div>`;
  }).join('');

  el.innerHTML=`<div class="league-summary">${summary}</div>
    <div class="overview-grid">${cards}</div>`;
}

// ── ROSTERS ──────────────────────────────────────────────────────────────────
function renderRosters() {
  const el=document.getElementById('tab-rosters');
  const maxSal=Math.max(...Object.values(DATA).flatMap(t=>t.starters.map(p=>p.salary)));

  const options=`<option value="all">— All Teams —</option>`+
    Object.entries(DATA).map(([k,t])=>`<option value="${k}"${k===rosterFilter?'selected':''}>${t.team_name}</option>`).join('');

  const teamsToShow = rosterFilter==='all'
    ? Object.entries(DATA)
    : Object.entries(DATA).filter(([k])=>k===rosterFilter);

  const cards=teamsToShow.map(([key,t])=>{
    const sp=t.cap_spent,av=CAP-sp,clr=capClr(sp);
    const pct=(sp/CAP*100).toFixed(1);
    const byPos={};
    POSITIONS.forEach(p=>byPos[p]=[]);
    t.starters.forEach(p=>{ if(byPos[p.pos]) byPos[p.pos].push(p); });

    let rows='';
    POSITIONS.forEach(pos=>{
      const players=(byPos[pos]||[]).sort((a,b)=>b.salary-a.salary);
      if(!players.length) return;
      const tot=players.reduce((s,p)=>s+p.salary,0);
      rows+=`<tr class="sec-row"><td colspan="3">${pos} — ${fmtM(tot)} (${pctOf(tot)})</td></tr>`;
      rows+=players.map(p=>{
        const bw=Math.round(p.salary/maxSal*100);
        return `<tr><td>${p.name}</td><td>${badge(p.pos)}</td>
          <td><div>${fmtM(p.salary)}</div>
            <div class="sal-bar"><div class="sal-bar-fill" style="width:${bw}%;background:${POS_COLORS[p.pos]||'var(--text3)'};"></div></div>
          </td></tr>`;
      }).join('');
    });
    if(t.ir?.length){
      rows+=`<tr class="sec-row"><td colspan="3">IR — 75% cap hit</td></tr>`;
      rows+=t.ir.map(p=>`<tr>
        <td>${p.name}<span class="ir-note">IR</span></td>
        <td>${badge('IR')}</td>
        <td>${fmtM(Math.round(p.salary*.75))} <span style="font-size:10px;color:var(--text3);">(${fmtM(p.salary)} full)</span></td>
      </tr>`).join('');
    }
    const taxiP=(t.taxi||[]).filter(p=>p.name);
    if(taxiP.length){
      const taxiTot=taxiP.reduce((s,p)=>s+p.salary,0);
      rows+=`<tr class="sec-row"><td colspan="3">Taxi Squad — no cap hit · ${fmtM(taxiTot)} banked</td></tr>`;
      rows+=taxiP.sort((a,b)=>b.salary-a.salary).map(p=>`<tr>
        <td style="color:var(--text3);">${p.name}</td>
        <td>${badge('Taxi')}</td>
        <td style="color:var(--text3);">${fmtM(p.salary)}</td>
      </tr>`).join('');
    }

    return `<div class="det-card">
      <div class="det-header">
        <div><div class="det-title">${t.team_name}</div><div class="det-user">${key}</div></div>
        <div class="det-cap-row">
          <div class="det-cap-item">
            <div class="det-cap-label">Spent</div>
            <div class="det-cap-val" style="color:${clr};">${fmtM(sp)} <span style="font-size:11px;opacity:.7;">${pct}%</span></div>
          </div>
          <div class="det-cap-item">
            <div class="det-cap-label">Available</div>
            <div class="det-cap-val" style="color:var(--green);">${fmtM(av)}</div>
          </div>
        </div>
      </div>
      <div style="padding:8px 18px;">
        <div class="cap-bar"><div class="cap-bar-fill" style="width:${pct}%;background:${clr};"></div></div>
      </div>
      <table class="roster-table">
        <thead><tr><th>Player</th><th>Pos</th><th style="text-align:right;">Salary</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="roster-controls">
      <select class="team-select" onchange="rosterFilter=this.value;renderRosters();">${options}</select>
      <span class="all-rosters-hint">${rosterFilter==='all'?'Showing all '+Object.keys(DATA).length+' teams':'Showing 1 team'}</span>
    </div>
    ${cards}`;
}

// ── COMPARE ───────────────────────────────────────────────────────────────────
function renderCompare() {
  const el=document.getElementById('tab-compare');
  const teams=Object.entries(DATA);
  const vals={
    spent:teams.map(([,t])=>t.cap_spent),
    avail:teams.map(([,t])=>CAP-t.cap_spent),
    QB:   teams.map(([,t])=>posTotal(t,'QB')),
    RB:   teams.map(([,t])=>posTotal(t,'RB')),
    WR:   teams.map(([,t])=>posTotal(t,'WR')),
    TE:   teams.map(([,t])=>posTotal(t,'TE')),
  };
  function heat(val,arr,hex){
    const mn=Math.min(...arr),mx=Math.max(...arr);
    const p=mx===mn?0:(val-mn)/(mx-mn);
    return `<div class="heat" style="background:${hex};opacity:${(p*.28+.04).toFixed(2)};"></div>`;
  }
  const sorted=[...teams].sort((a,b)=>b[1].cap_spent-a[1].cap_spent);
  const rows=sorted.map(([key,t])=>{
    const sp=t.cap_spent,av=CAP-sp;
    const qb=posTotal(t,'QB'),rb=posTotal(t,'RB'),wr=posTotal(t,'WR'),te=posTotal(t,'TE');
    const most=sp===Math.max(...vals.spent),least=sp===Math.min(...vals.spent);
    return `<tr>
      <td><div class="cmp-name">${t.team_name}</div><div class="cmp-user">${key}</div></td>
      <td class="${most?'worst':least?'best':''}">${heat(sp,vals.spent,'#ff4d6a')}${fmtM(sp)}<div style="font-size:10px;color:var(--text3);">${pctOf(sp)}</div></td>
      <td style="color:var(--green);">${heat(av,vals.avail,'#18e07a')}${fmtM(av)}</td>
      <td class="qb-h">${heat(qb,vals.QB,'#b89ffe')}${fmtM(qb)}</td>
      <td class="rb-h">${heat(rb,vals.RB,'#18e07a')}${fmtM(rb)}</td>
      <td class="wr-h">${heat(wr,vals.WR,'#00d4ff')}${fmtM(wr)}</td>
      <td class="te-h">${heat(te,vals.TE,'#ffc94d')}${fmtM(te)}</td>
    </tr>`;
  }).join('');
  el.innerHTML=`
    <p style="font-size:12px;color:var(--text3);margin-bottom:14px;">Sorted by cap spent. Shading shows relative investment within each column across the league.</p>
    <div class="cmp-wrap"><table class="cmp-table">
      <thead><tr>
        <th style="text-align:left;">Team</th>
        <th>Cap Spent</th>
        <th style="color:var(--green);">Available</th>
        <th class="qb-h">QB</th><th class="rb-h">RB</th><th class="wr-h">WR</th><th class="te-h">TE</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

// ── TOP PAID ──────────────────────────────────────────────────────────────────
function renderTopPaid() {
  const el=document.getElementById('tab-toppaid');

  // Build flat list per position across all teams
  function topByPos(pos, limit) {
    const all=[];
    Object.entries(DATA).forEach(([key,t])=>{
      t.starters.filter(p=>p.pos===pos).forEach(p=>{
        all.push({...p, team_name:t.team_name, owner:key});
      });
    });
    return all.sort((a,b)=>b.salary-a.salary).slice(0,limit);
  }

  const sections=[
    {pos:'QB', limit:10,  label:'Top 10 Quarterbacks'},
    {pos:'RB', limit:10,  label:'Top 10 Running Backs'},
    {pos:'WR', limit:15,  label:'Top 15 Wide Receivers'},
    {pos:'TE', limit:5,   label:'Top 5 Tight Ends'},
  ];

  el.innerHTML=`<div class="top-paid-grid">${sections.map(({pos,limit,label})=>{
    const players=topByPos(pos,limit);
    const maxSal=players[0]?.salary||1;
    const color=POS_COLORS[pos];
    const rows=players.map((p,i)=>{
      const rankCls=i===0?'tp-rank-1':i===1?'tp-rank-2':i===2?'tp-rank-3':'';
      const barW=Math.round(p.salary/maxSal*100);
      return `<div class="tp-row">
        <div class="tp-rank ${rankCls}">${i+1}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
            <span class="tp-player-name">${p.name}</span>
            <span class="tp-salary" style="color:${color};">${fmtM(p.salary)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:3px;">
            <div style="flex:1;"><div class="tp-sal-bar-bg"><div class="tp-sal-bar-fill" style="width:${barW}%;background:${color};"></div></div></div>
            <span class="tp-team">${p.team_name}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="tp-section">
      <div class="tp-section-header">
        <div class="tp-section-title" style="color:${color};">${label}</div>
        <div class="tp-section-sub">Top ${limit} by salary</div>
      </div>
      ${rows}
    </div>`;
  }).join('')}</div>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
