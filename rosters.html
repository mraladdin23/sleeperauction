<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ballers Empire — Salary Cap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0d0f14; --surface:#161820; --surface2:#1e2029; --surface3:#252733;
  --border:#2e3040; --border2:#3a3d52;
  --accent:#7c5cfc; --accent2:#9d7ffe;
  --green:#18e07a; --red:#ff4d6a; --yellow:#ffc94d; --cyan:#00d4ff;
  --text:#e8eaf0; --text2:#9296a8; --text3:#5a5e72;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:rgba(22,24,32,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.topbar-logo{font-family:var(--font-display);font-size:22px;letter-spacing:1px;}
.topbar-logo span{color:var(--accent);}
.topbar-sub{font-size:13px;color:var(--text3);font-family:var(--font-body);margin-left:10px;font-weight:400;}
a.back-btn{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);transition:color .15s,border-color .15s;}
a.back-btn:hover{color:var(--text);border-color:var(--border2);}

.main{padding:20px;max-width:1500px;margin:0 auto;}

/* Summary bar */
.league-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;}
.sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.sum-val{font-family:var(--font-mono);font-size:17px;font-weight:600;}
.sum-sub{font-size:10px;color:var(--text3);margin-top:2px;}

/* Controls */
.controls{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.view-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;}
.view-btn{padding:7px 15px;font-size:13px;font-family:var(--font-body);background:none;border:none;color:var(--text2);cursor:pointer;transition:background .15s,color .15s;}
.view-btn.active{background:var(--accent);color:#fff;}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{padding:5px 11px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip:hover:not(.active){border-color:var(--border2);color:var(--text);}

/* OVERVIEW */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px;}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .2s;}
.ov-card:hover{border-color:var(--border2);}
.ov-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ov-name{font-weight:600;font-size:15px;}
.ov-user{font-size:11px;color:var(--text3);margin-top:1px;}
.ov-pct{font-family:var(--font-mono);font-size:13px;font-weight:600;text-align:right;}
.cap-bar{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.cap-bar-fill{height:100%;border-radius:99px;}
.ov-money{display:flex;gap:14px;font-size:12px;color:var(--text2);margin-bottom:12px;}
.ov-money strong{font-family:var(--font-mono);}

/* pos blocks */
.pos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.pos-blk{background:var(--surface2);border-radius:var(--radius-sm);padding:6px;text-align:center;}
.pos-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;}
.pos-val{font-family:var(--font-mono);font-size:12px;font-weight:600;}

/* top players */
.top-player{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(46,48,64,.4);}
.top-player:last-child{border-bottom:none;}
.tp-left{display:flex;align-items:center;gap:6px;min-width:0;}
.tp-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-sal{font-family:var(--font-mono);font-size:11px;color:var(--text2);flex-shrink:0;}

/* DETAIL */
.detail-wrap{display:flex;flex-direction:column;gap:28px;}
.det-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.det-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.det-title{font-size:17px;font-weight:600;}
.det-user{font-size:12px;color:var(--text3);}
.det-cap-row{display:flex;gap:20px;align-items:center;}
.det-cap-item{text-align:right;}
.det-cap-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.det-cap-val{font-family:var(--font-mono);font-size:14px;font-weight:600;}
.det-bar-wrap{padding:0 18px 4px;}

.roster-table{width:100%;border-collapse:collapse;}
.roster-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:7px 18px;border-bottom:1px solid var(--border);text-align:left;font-weight:500;background:var(--surface2);}
.roster-table th:last-child{text-align:right;}
.roster-table td{padding:7px 18px;border-bottom:1px solid rgba(46,48,64,.4);font-size:13px;vertical-align:middle;}
.roster-table tr:last-child td{border-bottom:none;}
.roster-table tr:hover td{background:rgba(255,255,255,.015);}
.roster-table td:last-child{text-align:right;font-family:var(--font-mono);font-size:12px;}
.sec-row td{background:rgba(30,32,41,.7);color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:5px 18px;}

.pos-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.2px;}
.pb-QB{background:rgba(124,92,252,.2);color:#b89ffe;}
.pb-RB{background:rgba(24,224,122,.15);color:#18e07a;}
.pb-WR{background:rgba(0,212,255,.15);color:#00d4ff;}
.pb-TE{background:rgba(255,201,77,.15);color:#ffc94d;}
.pb-Taxi{background:rgba(90,94,114,.25);color:var(--text3);}
.pb-IR{background:rgba(255,77,106,.15);color:#ff4d6a;}

.sal-bar{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:3px;width:100px;}
.sal-bar-fill{height:100%;border-radius:99px;}
.ir-note{font-size:10px;color:var(--red);margin-left:5px;}

/* COMPARE */
.cmp-wrap{overflow-x:auto;}
.cmp-table{width:100%;border-collapse:collapse;min-width:860px;}
.cmp-table th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap;background:var(--surface2);}
.cmp-table th:first-child{text-align:left;}
.cmp-table td{padding:9px 14px;border-bottom:1px solid rgba(46,48,64,.35);font-size:13px;text-align:right;font-family:var(--font-mono);position:relative;}
.cmp-table td:first-child{text-align:left;font-family:var(--font-body);font-weight:500;}
.cmp-table tr:hover td{background:rgba(255,255,255,.02);}
.heat{position:absolute;inset:0;pointer-events:none;border-radius:0;}
.best{color:var(--green)!important;}
.worst{color:var(--red)!important;}
.cmp-name{font-weight:600;}
.cmp-user{font-size:11px;color:var(--text3);}

/* POS colors for headers */
.qb-h{color:#b89ffe;} .rb-h{color:#18e07a;} .wr-h{color:#00d4ff;} .te-h{color:#ffc94d;}

@media(max-width:600px){
  .overview-grid{grid-template-columns:1fr;}
  .pos-grid{grid-template-columns:repeat(2,1fr);}
  .league-summary{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

000}, {"name": "Bhayshul Tuten", "salary": 7500000}]}};

let view = 'overview';
let active = new Set(Object.keys(DATA));

// ── formatters ───────────────────────────────────────────────────────────────
const fmtM  = n => n >= 1e6 ? '$'+(n/1e6).toFixed(1)+'M' : n >= 1e3 ? '$'+(n/1e3).toFixed(0)+'K' : '$'+n;
const pctOf = n => ((n/CAP)*100).toFixed(1)+'%';
const capClr = s => s/CAP > .72 ? 'var(--red)' : s/CAP > .58 ? 'var(--yellow)' : 'var(--green)';
const posTotal = (t,pos) => t.starters.filter(p=>p.pos===pos).reduce((a,p)=>a+p.salary,0);
const badge = pos => `<span class="pos-badge pb-${pos}">${pos}</span>`;

// ── league summary ───────────────────────────────────────────────────────────
function renderSummary() {
  const teams = Object.values(DATA);
  const spent = teams.map(t=>t.cap_spent);
  const avail = teams.map(t=>CAP-t.cap_spent);
  const avg   = Math.round(spent.reduce((a,b)=>a+b)/teams.length);
  document.getElementById('league-summary').innerHTML = [
    ['Salary Cap',     fmtM(CAP),              '301.2M / $1 = $100K', 'var(--accent2)'],
    ['Avg Cap Spent',  fmtM(avg),              pctOf(avg)+' of cap',  'var(--yellow)'],
    ['Most Spent',     fmtM(Math.max(...spent)),'',                    'var(--red)'],
    ['Least Spent',    fmtM(Math.min(...spent)),'',                    'var(--green)'],
    ['Most Available', fmtM(Math.max(...avail)),'',                    'var(--green)'],
    ['Least Available',fmtM(Math.min(...avail)),'',                    'var(--red)'],
  ].map(([label,val,sub,color])=>`
    <div class="sum-card">
      <div class="sum-label">${label}</div>
      <div class="sum-val" style="color:${color};">${val}</div>
      ${sub ? `<div class="sum-sub">${sub}</div>` : ''}
    </div>`).join('');
}

// ── chips ────────────────────────────────────────────────────────────────────
function renderChips() {
  const allOn = active.size === Object.keys(DATA).length;
  document.getElementById('chips').innerHTML =
    `<div class="chip ${allOn?'active':''}" onclick="toggleAll()">All</div>` +
    Object.entries(DATA).map(([k,t])=>
      `<div class="chip ${active.has(k)?'active':''}" onclick="toggleTeam('${k}')">${t.team_name}</div>`
    ).join('');
}

function toggleTeam(k) {
  if (active.has(k) && active.size===1) return;
  active.has(k) ? active.delete(k) : active.add(k);
  renderChips(); renderCurrent();
}
function toggleAll() {
  active = active.size===Object.keys(DATA).length
    ? new Set([Object.keys(DATA)[0]])
    : new Set(Object.keys(DATA));
  renderChips(); renderCurrent();
}

// ── view switcher ────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  ['overview','detail','compare'].forEach(n => {
    document.getElementById('view-'+n).style.display = n===v ? '' : 'none';
  });
  document.querySelectorAll('.view-btn').forEach((b,i)=>
    b.classList.toggle('active',['overview','detail','compare'][i]===v)
  );
  // compare always shows all — hide chips
  document.getElementById('chips').style.display = v==='compare' ? 'none' : '';
  renderCurrent();
}
function renderCurrent() {
  if (view==='overview') renderOverview();
  else if (view==='detail') renderDetail();
  else renderCompare();
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
function renderOverview() {
  const el = document.getElementById('view-overview');
  el.innerHTML = `<div class="overview-grid">${
    Object.entries(DATA).filter(([k])=>active.has(k)).map(([key,t])=>{
      const spent = t.cap_spent, avail = CAP-spent;
      const clr = capClr(spent);
      const top3 = [...t.starters].sort((a,b)=>b.salary-a.salary).slice(0,3);
      return `<div class="ov-card">
        <div class="ov-header">
          <div><div class="ov-name">${t.team_name}</div><div class="ov-user">${key}</div></div>
          <div><div class="ov-pct" style="color:${clr};">${pctOf(spent)}</div>
            <div style="font-size:10px;color:var(--text3);">cap used</div></div>
        </div>
        <div class="cap-bar"><div class="cap-bar-fill" style="width:${(spent/CAP*100).toFixed(1)}%;background:${clr};"></div></div>
        <div class="ov-money">
          <span><strong style="color:${clr};">${fmtM(spent)}</strong> spent</span>
          <span><strong style="color:var(--green);">${fmtM(avail)}</strong> avail</span>
        </div>
        <div class="pos-grid">${POSITIONS.map(pos=>{
          const tot = posTotal(t,pos);
          return `<div class="pos-blk">
            <div class="pos-lbl" style="color:${POS_COLORS[pos]};">${pos}</div>
            <div class="pos-val" style="color:${POS_COLORS[pos]};">${fmtM(tot)}</div>
          </div>`;
        }).join('')}</div>
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;">Top Salaries</div>
        ${top3.map(p=>`
          <div class="top-player">
            <div class="tp-left">${badge(p.pos)}<span class="tp-name">${p.name}</span></div>
            <span class="tp-sal">${fmtM(p.salary)}</span>
          </div>`).join('')}
      </div>`;
    }).join('')
  }</div>`;
}

// ── DETAIL ───────────────────────────────────────────────────────────────────
function renderDetail() {
  const el = document.getElementById('view-detail');
  const maxSal = Math.max(...Object.values(DATA).flatMap(t=>t.starters.map(p=>p.salary)));

  el.innerHTML = `<div class="detail-wrap">${
    Object.entries(DATA).filter(([k])=>active.has(k)).map(([key,t])=>{
      const spent=t.cap_spent, avail=CAP-spent, clr=capClr(spent);
      const pct=(spent/CAP*100).toFixed(1);

      // group by pos
      const byPos = {};
      POSITIONS.forEach(p=>byPos[p]=[]);
      t.starters.forEach(p=>{
        const slot = byPos[p.pos] || byPos['QB'];
        (byPos[p.pos]||[]).push(p);
      });

      let rows = '';
      POSITIONS.forEach(pos=>{
        const players = (byPos[pos]||[]).sort((a,b)=>b.salary-a.salary);
        if (!players.length) return;
        const tot = players.reduce((s,p)=>s+p.salary,0);
        rows += `<tr class="sec-row"><td colspan="3">${pos} — ${fmtM(tot)} (${pctOf(tot)})</td></tr>`;
        rows += players.map(p=>{
          const barW = Math.round(p.salary/maxSal*100);
          return `<tr>
            <td>${p.name}</td>
            <td>${badge(p.pos)}</td>
            <td>
              <div>${fmtM(p.salary)}</div>
              <div class="sal-bar"><div class="sal-bar-fill" style="width:${barW}%;background:${POS_COLORS[p.pos]||'var(--text3)'};"></div></div>
            </td>
          </tr>`;
        }).join('');
      });

      if (t.ir?.length) {
        rows += `<tr class="sec-row"><td colspan="3">IR — 75% cap hit</td></tr>`;
        rows += t.ir.map(p=>`<tr>
          <td>${p.name}<span class="ir-note">IR</span></td>
          <td>${badge('IR')}</td>
          <td>${fmtM(Math.round(p.salary*.75))} <span style="font-size:10px;color:var(--text3);">(${fmtM(p.salary)} full)</span></td>
        </tr>`).join('');
      }

      const taxiPlayers = (t.taxi||[]).filter(p=>p.name);
      if (taxiPlayers.length) {
        const taxiTotal = taxiPlayers.reduce((s,p)=>s+p.salary,0);
        rows += `<tr class="sec-row"><td colspan="3">Taxi Squad — no cap hit (${fmtM(taxiTotal)} banked)</td></tr>`;
        rows += taxiPlayers.sort((a,b)=>b.salary-a.salary).map(p=>`<tr>
          <td style="color:var(--text3);">${p.name}</td>
          <td>${badge('Taxi')}</td>
          <td style="color:var(--text3);">${fmtM(p.salary)}</td>
        </tr>`).join('');
      }

      return `<div class="det-card">
        <div class="det-header">
          <div><div class="det-title">${t.team_name}</div><div class="det-user">${key}</div></div>
          <div class="det-cap-row">
            <div class="det-cap-item">
              <div class="det-cap-label">Spent</div>
              <div class="det-cap-val" style="color:${clr};">${fmtM(spent)} <span style="font-size:11px;opacity:.7;">${pct}%</span></div>
            </div>
            <div class="det-cap-item">
              <div class="det-cap-label">Available</div>
              <div class="det-cap-val" style="color:var(--green);">${fmtM(avail)}</div>
            </div>
          </div>
        </div>
        <div class="det-bar-wrap" style="padding:8px 18px;">
          <div class="cap-bar"><div class="cap-bar-fill" style="width:${pct}%;background:${clr};"></div></div>
        </div>
        <table class="roster-table">
          <thead><tr><th>Player</th><th>Pos</th><th style="text-align:right;">Salary</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('')
  }</div>`;
}

// ── COMPARE ───────────────────────────────────────────────────────────────────
function renderCompare() {
  const el = document.getElementById('view-compare');
  const teams = Object.entries(DATA);

  const vals = {
    spent: teams.map(([,t])=>t.cap_spent),
    avail: teams.map(([,t])=>CAP-t.cap_spent),
    QB:    teams.map(([,t])=>posTotal(t,'QB')),
    RB:    teams.map(([,t])=>posTotal(t,'RB')),
    WR:    teams.map(([,t])=>posTotal(t,'WR')),
    TE:    teams.map(([,t])=>posTotal(t,'TE')),
  };

  function heat(val, arr, hexColor) {
    const mn=Math.min(...arr), mx=Math.max(...arr);
    const p = mx===mn ? 0 : (val-mn)/(mx-mn);
    const opacity = (p*0.3+0.04).toFixed(2);
    return `<div class="heat" style="background:${hexColor};opacity:${opacity};"></div>`;
  }

  const sorted = [...teams].sort((a,b)=>b[1].cap_spent-a[1].cap_spent);

  const rows = sorted.map(([key,t],ri)=>{
    const sp=t.cap_spent, av=CAP-sp;
    const qb=posTotal(t,'QB'), rb=posTotal(t,'RB'), wr=posTotal(t,'WR'), te=posTotal(t,'TE');
    const isMostSpent  = sp===Math.max(...vals.spent);
    const isLeastSpent = sp===Math.min(...vals.spent);
    return `<tr>
      <td><div class="cmp-name">${t.team_name}</div><div class="cmp-user">${key}</div></td>
      <td class="${isMostSpent?'worst':isLeastSpent?'best':''}">${heat(sp,vals.spent,'#ff4d6a')}${fmtM(sp)}<div style="font-size:10px;color:var(--text3);">${pctOf(sp)}</div></td>
      <td style="color:var(--green);">${heat(av,vals.avail,'#18e07a')}${fmtM(av)}</td>
      <td class="qb-h">${heat(qb,vals.QB,'#b89ffe')}${fmtM(qb)}</td>
      <td class="rb-h">${heat(rb,vals.RB,'#18e07a')}${fmtM(rb)}</td>
      <td class="wr-h">${heat(wr,vals.WR,'#00d4ff')}${fmtM(wr)}</td>
      <td class="te-h">${heat(te,vals.TE,'#ffc94d')}${fmtM(te)}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px;">Sorted by cap spent. Shading shows relative spend — darker = higher within that column.</p>
    <div class="cmp-wrap">
      <table class="cmp-table">
        <thead><tr>
          <th style="text-align:left;">Team</th>
          <th>Cap Spent</th>
          <th style="color:var(--green);">Available</th>
          <th class="qb-h">QB</th>
          <th class="rb-h">RB</th>
          <th class="wr-h">WR</th>
          <th class="te-h">TE</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderSummary();
renderChips();
renderOverview();
</script>
