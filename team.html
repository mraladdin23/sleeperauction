<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SleeperBid — Team Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--surface:#161820;--surface2:#1e2029;--surface3:#252733;--border:#2e3040;--border2:#3a3d52;--accent:#7c5cfc;--accent2:#9d7ffe;--green:#18e07a;--red:#ff4d6a;--yellow:#ffc94d;--text:#e8eaf0;--text2:#9296a8;--text3:#5a5e72;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--radius:10px;--radius-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;min-height:100vh;}
body.light-mode{--bg:#f4f5f8;--surface:#fff;--surface2:#eef0f5;--surface3:#e4e7ef;--border:#d4d8e8;--border2:#bbbfcf;--text:#18192a;--text2:#4a4e6a;--text3:#8a8eaa;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:rgba(22,24,32,.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
body.light-mode .topbar{background:rgba(255,255,255,.95);}
.topbar-logo{font-family:var(--font-display);font-size:22px;letter-spacing:1px;}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tbtn{font-size:13px;color:var(--text2);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;transition:all .15s;font-family:var(--font-body);}
.tbtn:hover{color:var(--text);border-color:var(--border2);}

.main{padding:20px;max-width:960px;margin:0 auto;}
.loading-wrap{display:flex;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--text3);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* HERO */
.team-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.team-avatar-lg{width:64px;height:64px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;font-family:var(--font-display);letter-spacing:1px;color:#fff;flex-shrink:0;}
.team-hero-info{flex:1;}
.team-hero-name{font-family:var(--font-display);font-size:28px;letter-spacing:.5px;}
.team-hero-user{font-size:13px;color:var(--text3);margin-top:2px;}
.hero-stats{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap;}
.hero-stat{text-align:center;}
.hero-stat-val{font-family:var(--font-mono);font-size:20px;font-weight:600;}
.hero-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.cap-bar-wrap{background:var(--surface3);border-radius:99px;height:6px;overflow:hidden;margin:14px 0 4px;}
.cap-bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.cap-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}

/* CARDS */
.card-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.card-box-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.card-box-title{font-size:14px;font-weight:600;}

/* ROSTER TABLE */
.rtable{width:100%;border-collapse:collapse;}
.rtable th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:7px 14px;border-bottom:1px solid var(--border);text-align:left;font-weight:500;}
.rtable td{padding:8px 14px;border-bottom:1px solid rgba(46,48,64,.4);font-size:13px;vertical-align:middle;}
.rtable tr:last-child td{border-bottom:none;}
.rtable tr:hover td{background:rgba(255,255,255,.015);}
.sec-label{background:rgba(30,32,41,.7);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:5px 14px;}
.pos-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;}
.pb-QB{background:rgba(124,92,252,.2);color:#b89ffe;}
.pb-RB{background:rgba(24,224,122,.15);color:#18e07a;}
.pb-WR{background:rgba(0,212,255,.15);color:#00d4ff;}
.pb-TE{background:rgba(255,201,77,.15);color:#ffc94d;}
.pb-Taxi{background:rgba(90,94,114,.25);color:var(--text3);}
.pb-IR{background:rgba(255,77,106,.15);color:#ff4d6a;}
.sal-bar{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-top:3px;width:80px;}
.sal-bar-fill{height:100%;border-radius:99px;}
.holdout-badge{display:inline-block;font-size:10px;background:rgba(255,201,77,.15);color:var(--yellow);border-radius:4px;padding:1px 6px;margin-left:6px;}
.promo-badge{display:inline-block;font-size:10px;background:rgba(24,224,122,.12);color:var(--green);border-radius:4px;padding:1px 6px;margin-left:6px;}

/* COMMISSIONER ACTION BUTTONS in table */
.act-cell{text-align:right;white-space:nowrap;}
.act-btn{font-size:13px;padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text2);cursor:pointer;font-family:var(--font-body);margin-left:3px;transition:all .15s;}
.act-btn:hover{border-color:var(--border2);color:var(--text);}
.promo-btn{font-size:11px;padding:3px 9px;border:1px solid rgba(24,224,122,.3);border-radius:4px;background:none;color:var(--green);cursor:pointer;font-family:var(--font-body);}
.undo-btn{font-size:11px;padding:3px 9px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text3);cursor:pointer;font-family:var(--font-body);}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:12px;color:var(--accent2);cursor:pointer;background:none;border:none;font-family:var(--font-body);width:100%;text-align:left;}
.add-row-btn:hover{color:var(--accent);}

/* COMM BADGE */
.comm-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:rgba(124,92,252,.15);color:var(--accent2);border-radius:4px;padding:2px 7px;margin-left:8px;}

/* POS row */
.pos-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pos-chip{padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;text-align:center;}

/* ACTIVITY FEED */
.feed-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.feed-row:last-child{border-bottom:none;}
.feed-icon{font-size:18px;flex-shrink:0;width:26px;text-align:center;}
.feed-text{font-size:13px;flex:1;}
.feed-time{font-size:11px;color:var(--text3);margin-top:2px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:999;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;width:100%;max-width:380px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font-body);outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font-body);transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-danger{background:none;color:var(--red);border:1px solid rgba(255,77,106,.3);}
.btn-danger:hover{background:rgba(255,77,106,.1);}
.modal-err{font-size:12px;color:var(--red);margin-top:8px;min-height:16px;}

/* TOAST */
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

@media print{.topbar,.tbtn,.act-cell,.add-row-btn,.modal-overlay{display:none!important;}body{background:#fff!important;color:#000!important;}.card-box{break-inside:avoid;}}
@media(max-width:600px){.team-hero{flex-direction:column;align-items:flex-start;}.hero-stats{gap:12px;}.rtable th:nth-child(3),.rtable td:nth-child(3){display:none;}}
</style>
</head>

    <input type="hidden" id="modal-slot"/>
    <div class="modal-err" id="modal-err"></div>

// ── Load ──────────────────────────────────────────────────
async function loadTeam() {
  if (!teamKey) {
    document.getElementById('loading-wrap').innerHTML =
      '<div style="color:var(--red);padding:40px;text-align:center;">No team specified. Go back and click a team name.</div>';
    return;
  }
  if (leagueId) {
    try {
      const [rSnap, feedSnap, faabSnap, hoSnap, promoSnap] = await Promise.all([
        db.ref(`leagues/${leagueId}/rosterData`).once('value'),
        db.ref(`leagues/${leagueId}/activityFeed`).orderByChild('timestamp').limitToLast(200).once('value'),
        db.ref(`leagues/${leagueId}/faabOverrides`).once('value'),
        db.ref(`leagues/${leagueId}/holdouts`).once('value'),
        db.ref(`leagues/${leagueId}/taxiPromos`).once('value'),
      ]);
      const fbRosters = rSnap.val();
      allRosters    = (fbRosters && Object.keys(fbRosters).length) ? fbRosters : JSON.parse(JSON.stringify(FALLBACK));
      faabOverrides = faabSnap.val() || {};
      holdouts      = hoSnap.val() || {};
      promos        = promoSnap.val() || {};
      feedSnap.forEach(c => allFeed.push(c.val()));
      allFeed.reverse();
    } catch(e) {
      console.warn('Firebase error, using fallback:', e);
      allRosters = JSON.parse(JSON.stringify(FALLBACK));
    }
  } else {
    allRosters = JSON.parse(JSON.stringify(FALLBACK));
  }
  renderTeam();
}

function saveKey() { return `leagues/${leagueId}/rosterData`; }

async function saveToFirebase() {
  if (!leagueId) return;
  Object.values(allRosters).forEach(t => {
    t.cap_spent = t.starters.reduce((s,p)=>s+p.salary,0)
      + (t.ir||[]).reduce((s,p)=>s+Math.round(p.salary*.75),0);
  });
  await db.ref(saveKey()).set(allRosters);
}

// ── Render ────────────────────────────────────────────────
function renderTeam() {
  const teamData = allRosters[teamKey];
  if (!teamData) {
    document.getElementById('loading-wrap').innerHTML =
      `<div style="color:var(--red);padding:40px;text-align:center;">Team "${teamKey}" not found.</div>`;
    return;
  }

  const comm       = isComm();
  const capSpent   = teamData.cap_spent || 0;
  const capAvail   = CAP - capSpent;
  const capPct     = Math.min(100, capSpent/CAP*100).toFixed(1);
  const capClr     = capSpent/CAP>.72?'var(--red)':capSpent/CAP>.58?'var(--yellow)':'var(--green)';
  const faabBal    = faabOverrides[teamKey] ?? null;
  const allSals    = (teamData.starters||[]).map(p=>p.salary);
  const maxSal     = Math.max(...allSals,1);
  const teamHO     = holdouts[teamKey] || {};
  const teamPromos = promos[teamKey] || {};
  const taxiPlayers = (teamData.taxi||[]).filter(p=>p.name);
  const irPlayers   = (teamData.ir||[]).filter(p=>p.name);

  // pos totals/counts
  const posTotals={QB:0,RB:0,WR:0,TE:0}, posCounts={QB:0,RB:0,WR:0,TE:0};
  (teamData.starters||[]).forEach(p=>{if(posTotals[p.pos]!==undefined){posTotals[p.pos]+=p.salary;posCounts[p.pos]++;}});

  // ── HERO ──────────────────────────────────────────────

    <div class="team-hero">
      <div class="team-avatar-lg">${teamData.team_name[0]}</div>

        <div style="display:flex;align-items:center;gap:8px;">
          <div class="team-hero-name">${teamData.team_name}</div>
          ${comm ? '<span class="comm-badge">⚙️ Comm</span>' : ''}
        </div>
        <div class="team-hero-user">@${teamKey}</div>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-val" style="color:${capClr};">${fmtM(capSpent)}</div>
            <div class="hero-stat-label">Cap Spent (${capPct}%)</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-val" style="color:var(--green);">${fmtM(capAvail)}</div>
            <div class="hero-stat-label">Available</div>
          </div>
          ${faabBal!==null?`<div class="hero-stat">
            <div class="hero-stat-val" style="color:var(--accent2);">${fmtFaab(faabBal)}</div>
            <div class="hero-stat-label">FAAB</div>
          </div>`:''}
          <div class="hero-stat">
            <div class="hero-stat-val">${(teamData.starters||[]).length}</div>
            <div class="hero-stat-label">Active</div>
          </div>
          ${taxiPlayers.length?`<div class="hero-stat">
            <div class="hero-stat-val" style="color:var(--text3);">${taxiPlayers.length}</div>
            <div class="hero-stat-label">Taxi</div>
          </div>`:''}
        </div>
        <div class="cap-bar-wrap"><div class="cap-bar-fill" style="width:${capPct}%;background:${capClr};"></div></div>
        <div class="cap-bar-labels"><span>${fmtM(capSpent)} spent</span><span>Cap: ${fmtM(CAP)}</span></div>
      </div>
    </div>`;

  // ── POSITION BREAKDOWN ─────────────────────────────────
  const warnMissing = POSITIONS.filter(p=>posCounts[p]===0);
  const warnLow     = POSITIONS.filter(p=>posCounts[p]===1);
  const posHTML = `
    <div class="card-box">
      <div class="card-box-header"><div class="card-box-title">Cap by Position</div></div>
      <div style="padding:14px 16px;">
        <div class="pos-row">${POSITIONS.map(pos=>`
          <div class="pos-chip" style="background:${posClr(pos)}22;color:${posClr(pos)};flex:1;min-width:70px;">
            <div style="font-size:11px;margin-bottom:3px;">${pos}</div>
            <div style="font-family:var(--font-mono);font-size:15px;">${fmtM(posTotals[pos])}</div>
            <div style="font-size:10px;opacity:.7;">${posCounts[pos]} player${posCounts[pos]!==1?'s':''}</div>
          </div>`).join('')}
        </div>
        ${warnMissing.length?`<div style="font-size:12px;color:var(--red);padding:4px 0;">⚠️ Missing: ${warnMissing.join(', ')}</div>`:''}
        ${warnLow.length?`<div style="font-size:12px;color:var(--yellow);padding:4px 0;">⚠️ Only 1 at: ${warnLow.join(', ')}</div>`:''}
      </div>
    </div>`;

  // ── ROSTER TABLE ───────────────────────────────────────
  const byPos={QB:[],RB:[],WR:[],TE:[]};
  (teamData.starters||[]).forEach(p=>{if(byPos[p.pos])byPos[p.pos].push(p);});

  let rosterRows = '';
  const commColspan = comm ? 4 : 3;
  const editTh = comm ? '<th class="act-cell">Actions</th>' : '';

  POSITIONS.forEach(pos => {
    const players = (byPos[pos]||[]).sort((a,b)=>b.salary-a.salary);
    const tot = players.reduce((s,p)=>s+p.salary,0);
    const addBtn = comm ? `<button class="add-row-btn" onclick="openAdd('starters','${pos}')">+ Add ${pos}</button>` : '';
    rosterRows += `<tr><td colspan="${commColspan}" class="sec-label">${pos}${players.length?` · ${fmtM(tot)} · ${players.length} player${players.length!==1?'s':''}`:'— none ⚠️'}</td></tr>`;
    if (!players.length && !comm) return;
    if (!players.length && comm) { rosterRows += `<tr><td colspan="${commColspan}">${addBtn}</td></tr>`; return; }
    rosterRows += players.map((p,i) => {
      const idx = teamData.starters.findIndex(s=>s.name===p.name&&s.pos===p.pos&&s.salary===p.salary);
      const bw  = Math.round(p.salary/maxSal*100);
      const ho  = teamHO[p.name];
      const hoBadge = ho ? `<span class="holdout-badge">🔥${ho.note?' '+ho.note:''}</span>` : '';
      const actionCell = comm ? `<td class="act-cell">

        <td>${posBadge(p.pos)}</td>
        <td style="text-align:right;font-family:var(--font-mono);font-size:12px;">
          ${fmtM(p.salary)}
          <div class="sal-bar"><div class="sal-bar-fill" style="width:${bw}%;background:${posClr(p.pos)};"></div></div>
        </td>
        ${actionCell}
      </tr>`;
    }).join('') + (comm ? `<tr><td colspan="${commColspan}">${addBtn}</td></tr>` : '');
  });

  // IR
  if (irPlayers.length || comm) {
    const tot = irPlayers.reduce((s,p)=>s+Math.round(p.salary*.75),0);
    rosterRows += `<tr><td colspan="${commColspan}" class="sec-label">IR · 75% cap hit${irPlayers.length?` · ${fmtM(tot)}`:''}</td></tr>`;
    rosterRows += irPlayers.map((p,i)=>{
      const actionCell = comm ? `<td class="act-cell"><button class="act-btn" onclick="openEdit('ir',${i})">✏️</button></td>` : '';

        <td style="color:var(--text2);">${p.name}</td>
        <td>${posBadge('','ir')}</td>
        <td style="text-align:right;font-family:var(--font-mono);font-size:12px;">${fmtM(Math.round(p.salary*.75))} <span style="color:var(--text3);font-size:10px;">(${fmtM(p.salary)})</span></td>

      </tr>`;
    }).join('') + (comm ? `<tr><td colspan="${commColspan}"><button class="add-row-btn" onclick="openAdd('ir','')">+ Add IR Player</button></td></tr>` : '');
  }

  // Taxi — with promo buttons for comm
  if (taxiPlayers.length || comm) {

    rosterRows += `<tr><td colspan="${commColspan}" class="sec-label">Taxi Squad · no cap hit${taxiPlayers.length?` · ${fmtM(taxiTot)} banked`:''}</td></tr>`;
    rosterRows += taxiPlayers.sort((a,b)=>b.salary-a.salary).map((p,i)=>{
      const taxiIdx = (teamData.taxi||[]).findIndex(x=>x.name===p.name);
      const promo   = teamPromos[p.name];
      const promoBadge = promo ? `<span class="promo-badge">⬆️ Promoted${promo.note?' · '+promo.note:''}</span>` : '';
      const actionCell = comm ? `<td class="act-cell">
        ${!promo ? `<button class="promo-btn" onclick="doPromote('${p.name.replace(/'/g,"\\'")}')">⬆️ Promote</button>` : `<button class="undo-btn" onclick="undoPromo('${p.name.replace(/'/g,"\\'")}')">↩ Undo</button>`}
        <button class="act-btn" onclick="openEdit('taxi',${taxiIdx})" title="Edit">✏️</button>
      </td>` : '';
      return `<tr>
        <td style="color:${promo?'var(--text3)':''};">${p.name}${promoBadge}</td>

        <td style="text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--text3);">${fmtM(p.salary)}</td>

    }).join('') + (comm ? `<tr><td colspan="${commColspan}"><button class="add-row-btn" onclick="openAdd('taxi','')">+ Add Taxi Player</button></td></tr>` : '');
  }

  const colgroup = comm ? `<colgroup><col/><col style="width:55px;"/><col style="width:130px;"/><col style="width:120px;"/></colgroup>` : '';
  const rosterHTML = `
    <div class="card-box">
      <div class="card-box-header">
        <div class="card-box-title">Full Roster</div>
        <span style="font-size:12px;color:var(--text3);">${(teamData.starters||[]).length} active · ${taxiPlayers.length} taxi${comm?' · Comm editing on':''}</span>

        </div>
        <div class="hero-stat">
          <div class="hero-stat-val" style="color:${capSpent>leagueAvg?'var(--red)':'var(--green)'};">${capSpent>leagueAvg?'+':''}${fmtM(capSpent-leagueAvg)}</div>
          <div class="hero-stat-label">vs League Avg (${fmtM(leagueAvg)})</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-val">${(teamData.starters||[]).length}</div>
          <div class="hero-stat-label">Active Players</div>
        </div>
      </div>
    </div>`;

  // ── ACTIVITY FEED ──────────────────────────────────────
  const teamFeed = allFeed.filter(item =>
    item.teamName===teamData.team_name || (item.teamName||'').toLowerCase()===teamKey
  ).slice(0,20);
  const icons = {nomination:'🏷',bid:'💰',claim:'✅',cancel:'❌'};
  const feedHTML = teamFeed.length ? `
    <div class="card-box">
      <div class="card-box-header"><div class="card-box-title">Recent Activity</div></div>
      <div style="padding:0 14px;">
        ${teamFeed.map(item=>{
          let desc='';
          if(item.type==='nomination') desc=`Nominated <strong>${item.playerName}</strong> · opening ${fmtFaab(item.amount)}`;
          else if(item.type==='bid')   desc=`Placed a bid on <strong>${item.playerName}</strong>`;
          else if(item.type==='claim') desc=`Claimed <strong>${item.playerName}</strong> for <strong style="color:var(--green);">${fmtFaab(item.amount)}</strong>`;
          else if(item.type==='cancel') desc=`Auction cancelled for <strong>${item.playerName}</strong>`;
          return `<div class="feed-row">
            <div class="feed-icon">${icons[item.type]||'📋'}</div>
            <div><div class="feed-text">${desc}</div><div class="feed-time">${timeAgo(item.timestamp)}</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  document.getElementById('loading-wrap').style.display='none';
  document.getElementById('team-content').style.display='';
  document.getElementById('team-content').innerHTML = heroHTML + posHTML + compareHTML + rosterHTML + feedHTML;
}

// ── HOLDOUT ───────────────────────────────────────────────
async function toggleHoldout(playerName) {
  if (!leagueId) { showToast('No league ID set','error'); return; }
  const existing = (holdouts[teamKey]||{})[playerName];
  const safe = safeName(playerName);
  if (existing) {
    if (holdouts[teamKey]) delete holdouts[teamKey][playerName];
    await db.ref(`leagues/${leagueId}/holdouts/${teamKey}/${safe}`).remove();
    showToast('Holdout flag removed','info');
  } else {
    const note = prompt(`Holdout note for ${playerName} (optional):`);
    if (note === null) return;
    if (!holdouts[teamKey]) holdouts[teamKey] = {};
    const data = {note:note||'', year:new Date().getFullYear(), flaggedAt:Date.now()};
    holdouts[teamKey][playerName] = data;
    await db.ref(`leagues/${leagueId}/holdouts/${teamKey}/${safe}`).set(data);
    showToast(`${playerName} flagged as holdout 🔥`, 'warn');
  }
  renderTeam();
}

// ── PROMO ─────────────────────────────────────────────────
async function doPromote(playerName) {
  if (!leagueId) return;
  const note = prompt(`Promotion note for ${playerName} (optional, e.g. "Week 3, added to 53-man"):`);
  if (note === null) return;
  const safe = safeName(playerName);
  if (!promos[teamKey]) promos[teamKey] = {};
  const data = {note:note||'', promoted:true, promotedAt:Date.now()};
  promos[teamKey][playerName] = data;
  await db.ref(`leagues/${leagueId}/taxiPromos/${teamKey}/${safe}`).set(data);
  showToast(`${playerName} marked as promoted ⬆️`, 'success');
  renderTeam();
}
async function undoPromo(playerName) {
  if (!leagueId) return;
  const safe = safeName(playerName);
  if (promos[teamKey]) delete promos[teamKey][playerName];
  await db.ref(`leagues/${leagueId}/taxiPromos/${teamKey}/${safe}`).remove();
  showToast('Promotion undone','info');
  renderTeam();
}

// ── EDITOR ────────────────────────────────────────────────
function openEdit(slot, idx) {
  const t = allRosters[teamKey];
  const p = slot==='ir' ? t.ir[idx] : slot==='taxi' ? t.taxi[idx] : t.starters[idx];
  if (!p) return;
  editCtx = {slot, idx, isNew:false};
  document.getElementById('modal-title').textContent = 'Edit Player';
  document.getElementById('modal-name').value = p.name;
  document.getElementById('modal-salary').value = p.salary;
  document.getElementById('modal-slot').value = slot;
  document.getElementById('modal-delete-btn').style.display = '';
  document.getElementById('modal-err').textContent = '';
  const pf = document.getElementById('modal-pos-field');
  if (slot==='starters') { pf.style.display=''; document.getElementById('modal-pos').value = p.pos||'WR'; }
  else pf.style.display = 'none';
  document.getElementById('edit-modal').classList.add('open');
}
function openAdd(slot, defaultPos) {
  editCtx = {slot, idx:-1, isNew:true};
  document.getElementById('modal-title').textContent = `Add ${slot==='taxi'?'Taxi':slot==='ir'?'IR':'Roster'} Player`;
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-salary').value = '';
  document.getElementById('modal-slot').value = slot;
  document.getElementById('modal-delete-btn').style.display = 'none';
  document.getElementById('modal-err').textContent = '';
  const pf = document.getElementById('modal-pos-field');
  pf.style.display = '';
  document.getElementById('modal-pos').value = defaultPos || 'WR';
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editCtx = null;
}
async function savePlayer() {
  if (!editCtx) return;
  const name   = document.getElementById('modal-name').value.trim();
  const salary = parseInt(document.getElementById('modal-salary').value);
  const slot   = document.getElementById('modal-slot').value;
  const pos    = document.getElementById('modal-pos').value;
  const errEl  = document.getElementById('modal-err');
  if (!name)         { errEl.textContent='Player name required.'; return; }
  if (!salary||salary<0) { errEl.textContent='Enter a valid salary.'; return; }
  const t = allRosters[teamKey];
  if (!editCtx.isNew) {
    const s = editCtx.slot;
    if (s==='starters') t.starters.splice(editCtx.idx,1);
    else if (s==='ir')  t.ir.splice(editCtx.idx,1);
    else if (s==='taxi') t.taxi.splice(editCtx.idx,1);
  }
  const player = slot==='starters' ? {pos, name, salary} : {name, salary};
  if (slot==='starters') t.starters.push(player);
  else if (slot==='ir')  { if(!t.ir)t.ir=[]; t.ir.push(player); }
  else if (slot==='taxi'){ if(!t.taxi)t.taxi=[]; t.taxi.push(player); }
  closeModal();
  await saveToFirebase();
  renderTeam();
  showToast(`${name} saved ✓`, 'success');
}
async function deletePlayer() {
  if (!editCtx||editCtx.isNew) return;
  const {slot, idx} = editCtx;
  const t = allRosters[teamKey];
  const name = slot==='starters' ? t.starters[idx]?.name : slot==='ir' ? t.ir[idx]?.name : t.taxi[idx]?.name;
  if (slot==='starters') t.starters.splice(idx,1);
  else if (slot==='ir')  t.ir.splice(idx,1);
  else if (slot==='taxi') t.taxi.splice(idx,1);
  closeModal();
  await saveToFirebase();
  renderTeam();
  showToast(`${name||'Player'} removed`, 'info');
}

document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-modal')) closeModal();
});

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, type='info') {
  let c = document.getElementById('tc');
  if (!c) { c=document.createElement('div'); c.id='tc'; c.style.cssText='position:fixed;bottom:20px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999;'; document.body.appendChild(c); }
  const colors = {success:'var(--green)',warn:'var(--yellow)',error:'var(--red)',info:'var(--accent)'};
  const el = document.createElement('div');
  el.style.cssText = `background:var(--surface2);border:1px solid var(--border2);border-left:3px solid ${colors[type]||colors.info};border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideIn .2s ease;`;
  el.textContent = msg; c.appendChild(el); setTimeout(()=>el.remove(), 3200);
}

loadTeam().catch(err => {
  document.getElementById('loading-wrap').innerHTML =
    `<div style="color:var(--red);padding:40px;text-align:center;">Error: ${err.message}</div>`;
});
</script>
