name: Deploy SleeperBid

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp cache-bust timestamp into sw.js
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          echo "Stamping: sleeperbid-$TIMESTAMP"
          sed -i "s/__TIMESTAMP__/$TIMESTAMP/g" sw.js

      - name: Commit updated sw.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: cache-bust sw.js [skip ci]"
          git push
